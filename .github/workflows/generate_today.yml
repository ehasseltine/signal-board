name: Generate Today Page

on:
  workflow_run:
    workflows: ["Daily Pipeline"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  generate:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Sync pipeline data to public/
        run: |
          # Pipeline writes to data/daily/ (primary) and docs/data/daily/ (copy).
          # Astro reads from public/data/daily/ at build time.
          mkdir -p public/data/daily

          # Try primary location first, fall back to docs copy
          if [ -f data/daily/latest.json ]; then
            cp data/daily/latest.json public/data/daily/latest.json
            for f in data/daily/2*.json; do
              [ -f "$f" ] && cp "$f" public/data/daily/
            done
            echo "Synced from data/daily/"
          elif [ -f docs/data/daily/latest.json ]; then
            cp docs/data/daily/latest.json public/data/daily/latest.json
            for f in docs/data/daily/2*.json; do
              [ -f "$f" ] && cp "$f" public/data/daily/
            done
            echo "Synced from docs/data/daily/"
          else
            echo "No pipeline data found in data/ or docs/data/. Skipping build."
            exit 1
          fi

          echo "Data synced:"
          ls -la public/data/daily/
          echo "Latest date:"
          python3 -c "import json; print(json.load(open('public/data/daily/latest.json'))['date'])"

      - name: Build with Astro
        run: npx astro build

      - name: Disable Jekyll processing
        run: touch docs/.nojekyll

      - name: Verify output
        run: |
          if [ ! -f docs/today/index.html ]; then
            echo "Build failed - no today page generated"
            exit 1
          fi
          echo "Build output:"
          ls -la docs/today/index.html
          head -5 docs/today/index.html
          echo "---"
          echo "All generated pages:"
          find docs -name "index.html" | head -20

      - name: Commit and push
        run: |
          git config user.name "Signal Board Bot"
          git config user.email "bot@signalboard.org"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build today page for $(date +%Y-%m-%d)"
            git push
          fi

  notify-failure:
    needs: [generate]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '\u26a0\ufe0f Generate Today Page failed on ' + today,
              body: 'Workflow run failed. [View details](' + context.server_url + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')'
            });
