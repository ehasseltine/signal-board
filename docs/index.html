<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Signal Board tracks how interconnected forces appear in the news and surfaces structural connections most coverage misses. 59 sources, 10 domains, updated daily.">
<meta property="og:title" content="Signal Board — See the Connections the News Misses">
<meta property="og:description" content="The forces reshaping the world don't stay in lanes. Signal Board tracks 59 sources across 10 domains and surfaces the structural connections most coverage misses.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://elisehasseltine.com/signal-board/">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Signal Board — See the Connections the News Misses">
<meta name="twitter:description" content="The forces reshaping the world don't stay in lanes. Signal Board surfaces structural connections across 59 sources and 10 domains.">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Signal Board",
  "description": "A research tool that tracks how interconnected forces appear in the news and surfaces the structural connections between them that most coverage misses.",
  "url": "https://elisehasseltine.com/signal-board/",
  "creator": { "@type": "Person", "name": "Elise Hasseltine", "url": "https://www.elisehasseltine.com/" }
}
</script>
<title>Signal Board — See the Connections the News Misses</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #131316;
    --surface-hover: #1a1a1f;
    --border: #1f1f25;
    --text: #e8e8e8;
    --text-dim: rgba(235,230,245,0.45);
    --text-mid: rgba(235,230,245,0.75);
    --purple: #6652FF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── HEADER ─── */
  .header {
    padding: 3.5rem 2rem 0;
    max-width: 1200px;
    margin: 0 auto;
    text-align: center;
  }
  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 0.6rem;
    color: #fff;
  }
  .header .tagline {
    color: var(--text-dim);
    font-size: 0.95rem;
    max-width: 500px;
    margin: 0 auto 1.5rem;
    line-height: 1.55;
  }
  .header .meta {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }
  .meta-pill {
    padding: 0.25rem 0.65rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.68rem;
    color: var(--text-dim);
  }
  .meta-pill strong { color: var(--text-mid); font-weight: 600; }

  /* ─── PULSE BAR ─── */
  .pulse-section {
    max-width: 1200px;
    margin: 0 auto 2rem;
    padding: 0 2rem;
  }
  .pulse-label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 0.6rem;
    text-align: center;
  }
  .pulse-bar {
    display: flex;
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
    gap: 2px;
  }
  .pulse-seg {
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
  }
  .pulse-seg:hover {
    filter: brightness(1.2);
    transform: scaleY(2.5);
    border-radius: 2px;
  }
  .pulse-tooltip {
    display: none;
    position: absolute;
    bottom: 120%;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a1f;
    border: 1px solid var(--border);
    padding: 0.35rem 0.6rem;
    border-radius: 6px;
    font-size: 0.68rem;
    white-space: nowrap;
    color: var(--text);
    z-index: 10;
    pointer-events: none;
  }
  .pulse-seg:hover .pulse-tooltip { display: block; }

  /* ─── MAIN ─── */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 2rem 2rem;
  }

  /* ─── EXPLORE BAR ─── */
  .explore-bar {
    display: flex;
    gap: 0.35rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 2.5rem;
  }
  .explore-btn {
    padding: 0.4rem 0.85rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .explore-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
  .explore-btn.active { color: #fff; }
  .explore-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ─── SECTION STYLING ─── */
  .section {
    margin-bottom: 3rem;
  }
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
    margin-bottom: 0.3rem;
  }
  .section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: #fff;
  }
  .section-count {
    font-size: 0.7rem;
    color: var(--text-dim);
  }
  .section-desc {
    font-size: 0.82rem;
    color: var(--text-dim);
    margin-bottom: 1.2rem;
    max-width: 600px;
    line-height: 1.5;
  }

  /* ─── COLLISION CARDS (Hot Topics) ─── */
  .collision-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 0.7rem;
  }
  .collision-card {
    border-radius: 12px;
    padding: 1.1rem;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    border: 1px solid rgba(255,255,255,0.05);
    cursor: default;
  }
  .collision-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }
  .collision-pair {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.15rem;
  }
  .collision-pair .domain-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
  }
  .collision-pair .x { font-size: 0.7rem; color: rgba(255,255,255,0.3); }
  .collision-count {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.35);
    margin-bottom: 0.8rem;
  }
  .collision-articles { display: flex; flex-direction: column; gap: 0.4rem; }
  .collision-article {
    display: block;
    text-decoration: none;
    color: inherit;
    padding: 0.45rem 0.55rem;
    background: rgba(0,0,0,0.2);
    border-radius: 6px;
    transition: background 0.15s;
  }
  .collision-article:hover { background: rgba(0,0,0,0.4); }
  .collision-article-title {
    font-size: 0.76rem;
    color: rgba(255,255,255,0.85);
    line-height: 1.35;
    font-weight: 500;
  }
  .collision-article-meta {
    font-size: 0.62rem;
    color: rgba(255,255,255,0.3);
    margin-top: 0.1rem;
  }

  /* ─── RADAR CARDS ─── */
  .radar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 0.7rem;
  }
  .radar-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    transition: transform 0.2s ease, border-color 0.2s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .radar-card:hover {
    transform: translateY(-1px);
    border-color: rgba(255,255,255,0.08);
  }
  .radar-tags {
    display: flex;
    gap: 0.3rem;
    flex-wrap: wrap;
    margin-bottom: 0.6rem;
  }
  .radar-tag {
    padding: 0.12rem 0.5rem;
    border-radius: 3px;
    font-size: 0.58rem;
    font-weight: 700;
    color: rgba(0,0,0,0.85);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .radar-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.4rem;
    line-height: 1.35;
  }
  .radar-summary {
    font-size: 0.76rem;
    color: var(--text-dim);
    margin-bottom: 0.5rem;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .radar-meta {
    font-size: 0.65rem;
    color: var(--text-dim);
  }
  .radar-source { font-weight: 600; color: var(--text-mid); }

  /* ─── FEED (All Articles) ─── */
  .feed-list { display: flex; flex-direction: column; gap: 1px; }
  .feed-item {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 1rem;
    align-items: center;
    padding: 0.65rem 0.8rem;
    background: var(--surface);
    border-radius: 4px;
    text-decoration: none;
    color: var(--text);
    transition: background 0.15s;
  }
  .feed-item:hover { background: var(--surface-hover); }
  .feed-title { font-size: 0.82rem; font-weight: 500; line-height: 1.35; }
  .feed-meta {
    display: flex;
    gap: 0.4rem;
    align-items: center;
    margin-top: 0.15rem;
    font-size: 0.65rem;
    color: var(--text-dim);
  }
  .feed-source { font-weight: 600; color: var(--text-mid); }
  .feed-tags {
    display: flex;
    gap: 0.2rem;
    flex-shrink: 0;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .feed-tag {
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    font-size: 0.55rem;
    font-weight: 700;
    color: rgba(0,0,0,0.85);
    white-space: nowrap;
  }

  .load-more {
    display: block;
    width: 100%;
    padding: 0.65rem;
    margin-top: 0.5rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .load-more:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }

  /* ─── FAQ ─── */
  .faq-section { max-width: 680px; margin-bottom: 2rem; }
  .faq-item { margin-bottom: 0.5rem; }
  .faq-q {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.2s;
    width: 100%;
    text-align: left;
    font-family: inherit;
    color: var(--text);
  }
  .faq-q:hover { background: var(--surface-hover); }
  .faq-q-text { font-size: 0.82rem; font-weight: 500; }
  .faq-toggle { font-size: 1rem; color: var(--text-dim); transition: transform 0.2s; flex-shrink: 0; margin-left: 0.5rem; }
  .faq-toggle.open { transform: rotate(45deg); }
  .faq-a {
    background: rgba(19,19,22,0.8);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    padding: 0.8rem 1rem;
    font-size: 0.78rem;
    line-height: 1.6;
    color: var(--text-dim);
    display: none;
  }
  .faq-a.open { display: block; }

  /* ─── FOOTER ─── */
  .footer {
    max-width: 1200px;
    margin: 1rem auto 2rem;
    padding: 1.2rem 2rem;
    border-top: 1px solid var(--border);
    font-size: 0.68rem;
    color: var(--text-dim);
    text-align: center;
  }
  .footer a { color: var(--purple); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  /* ─── EXPLORE LINK ─── */
  .explore-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    color: var(--purple);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 0.8rem 1.8rem;
    border: 1px solid rgba(102,82,255,0.3);
    border-radius: 8px;
    transition: all 0.25s ease;
  }
  .explore-link:hover {
    background: rgba(102,82,255,0.08);
    border-color: var(--purple);
  }

  .empty-state {
    text-align: center;
    padding: 2rem;
    color: var(--text-dim);
    font-size: 0.82rem;
  }

  @media (max-width: 768px) {
    .header, .main, .footer, .pulse-section { padding-left: 1rem; padding-right: 1rem; }
    .header h1 { font-size: 1.8rem; }
    .feed-item { grid-template-columns: 1fr; }
    .feed-tags { margin-top: 0.3rem; justify-content: flex-start; }
    .collision-grid { grid-template-columns: 1fr; }
    .radar-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Signal Board</h1>
  <p class="tagline">The forces reshaping the world don't stay in lanes. This tool tracks where they collide.</p>
  <div class="meta" id="meta"></div>
</div>

<div class="pulse-section">
  <div class="pulse-label" id="pulseLabel">Today's coverage</div>
  <div class="pulse-bar" id="pulseBar"></div>
</div>

<div class="main">
  <div class="explore-bar" id="exploreBar"></div>

  <div id="collisionContainer"></div>
  <div id="radarContainer"></div>

  <div class="section" id="feedSection">
    <div class="section-header">
      <div class="section-title">Full feed</div>
      <div class="section-count" id="feedCount"></div>
    </div>
    <div class="feed-list" id="feedList"></div>
    <button class="load-more" id="loadMore" style="display:none">Show more</button>
  </div>

  <div class="section" style="text-align:center;margin-bottom:2rem">
    <a href="./explore/" class="explore-link">Explore the full dataset →</a>
  </div>

  <div class="faq-section" id="faqSection"></div>
</div>

<div class="footer">
  Built by <a href="https://www.elisehasseltine.com/">Elise Hasseltine</a> · 59 sources · 10 domains · Updated daily
</div>

<script>
const DC = {
  ai: '#6652FF', labor: '#FF5400', governance: '#FF0054', information: '#9E0059',
  economics: '#00C2A8', climate: '#4CAF50', security: '#D32F2F',
  geopolitics: '#1976D2', domestic_politics: '#7B1FA2', legal: '#FF9800',
};
const DL = {
  ai: 'AI', labor: 'Labor', governance: 'Governance', information: 'Information',
  economics: 'Economics', climate: 'Climate', security: 'Security',
  geopolitics: 'Geopolitics', domestic_politics: 'Politics', legal: 'Legal',
};
const DG = {};
for (const [k,c] of Object.entries(DC)) {
  const r = parseInt(c.slice(1,3),16), g = parseInt(c.slice(3,5),16), b = parseInt(c.slice(5,7),16);
  DG[k] = `linear-gradient(135deg, rgba(${r},${g},${b},0.22) 0%, rgba(${r},${g},${b},0.06) 100%)`;
}

const JUNK = [
  /\bsmart lock\b/i, /\bsmart home\b/i, /\bproduct review\b/i,
  /\bbest .{0,20}(buy|deal|price|sale)\b/i, /\bcoupon\b/i, /\bdiscount code\b/i,
  /\bgadget\b/i, /\bunboxing\b/i, /\bhoroscope\b/i, /\brecipe\b/i,
];

let articles = [], stats = {}, filter = 'all', showing = 50;

async function init() {
  try {
    const cb = '?v=' + Date.now();
    let r;
    try { r = await fetch('./data/articles.json' + cb); if(!r.ok) throw 0; }
    catch { r = await fetch('../data/articles.json' + cb); }
    const d = await r.json();
    articles = d.articles || [];
    stats = d.stats || {};
    document.getElementById('meta').innerHTML = `
      <span class="meta-pill"><strong>${stats.total_articles||0}</strong> articles today</span>
      <span class="meta-pill"><strong>${stats.cross_domain_count||0}</strong> cross-domain connections</span>
      <span class="meta-pill">Updated ${fmtDate(d.last_updated)}</span>
    `;
    render();
  } catch(e) {
    document.getElementById('feedList').innerHTML = '<div class="empty-state">Loading data...</div>';
    console.error(e);
  }
}

function render() {
  renderPulse();
  renderExplore();
  renderCollisions();
  renderRadar();
  renderFeed();
  renderFaq();
}

function renderPulse() {
  const bar = document.getElementById('pulseBar');
  const counts = {};
  for (const a of articles) for (const d of (a.domains||[])) counts[d] = (counts[d]||0) + 1;
  const total = Object.values(counts).reduce((s,c) => s+c, 0);
  if (!total) { bar.innerHTML = ''; return; }

  bar.innerHTML = Object.entries(counts)
    .sort((a,b) => b[1]-a[1])
    .map(([k,c]) => {
      const pct = Math.max((c/total)*100, 3);
      return `<div class="pulse-seg" style="width:${pct}%;background:${DC[k]||'#666'}"
                   onclick="setFilter('${k}')">
        <div class="pulse-tooltip">${DL[k]||k}: ${c} articles</div>
      </div>`;
    }).join('');
}

function renderExplore() {
  const el = document.getElementById('exploreBar');
  let html = `<button class="explore-btn ${filter==='all'?'active':''}" onclick="setFilter('all')"
    style="${filter==='all'?'background:var(--purple);border-color:var(--purple)':''}">All</button>`;

  html += `<button class="explore-btn ${filter==='cross'?'active':''}" onclick="setFilter('cross')"
    style="${filter==='cross'?'background:#fff;border-color:#fff;color:#000':''}">Connections</button>`;

  for (const [k,l] of Object.entries(DL)) {
    const on = filter === k;
    html += `<button class="explore-btn ${on?'active':''}" onclick="setFilter('${k}')"
      style="${on?`background:${DC[k]};border-color:${DC[k]};color:rgba(0,0,0,0.85)`:''}">
      <span class="explore-dot" style="background:${DC[k]}"></span>${l}
    </button>`;
  }
  el.innerHTML = html;
}

function setFilter(f) {
  filter = f; showing = 50;
  renderExplore();
  renderFeed();
  // Show/hide structural sections based on filter
  document.getElementById('collisionContainer').style.display = (f==='all'||f==='cross') ? 'block' : 'none';
  document.getElementById('radarContainer').style.display = (f==='all') ? 'block' : 'none';
}

function getFiltered() {
  if (filter === 'cross') return articles.filter(a => a.cross_domain);
  if (filter !== 'all') return articles.filter(a => a.domains && a.domains.includes(filter));
  return articles;
}

function isJunk(a) {
  const t = (a.title + ' ' + (a.summary||'')).toLowerCase();
  return JUNK.some(p => p.test(t));
}

function cleanText(s) {
  if (!s) return '';
  const ta = document.createElement('textarea');
  ta.innerHTML = s;
  let t = ta.value;
  t = t.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
  return t;
}

function renderCollisions() {
  const el = document.getElementById('collisionContainer');
  const pairs = {};
  for (const a of articles) {
    if (a.cross_domain && a.domains && a.domains.length >= 2) {
      const ds = [...a.domains].sort();
      for (let i=0;i<ds.length;i++) for (let j=i+1;j<ds.length;j++) {
        const k = ds[i]+'+'+ds[j];
        if(!pairs[k]) pairs[k]=[];
        pairs[k].push(a);
      }
    }
  }

  const top = Object.entries(pairs).sort((a,b)=>b[1].length-a[1].length).slice(0,4);
  if (!top.length) { el.innerHTML = ''; return; }

  el.innerHTML = `
    <div class="section">
      <div class="section-header"><div class="section-title">Where forces collide</div></div>
      <div class="section-desc">These are the strongest structural overlaps right now. When domains converge, that convergence is the story.</div>
      <div class="collision-grid">
        ${top.map(([pk,arts]) => {
          const [d1,d2] = pk.split('+');
          const l1=DL[d1]||d1, l2=DL[d2]||d2;
          const c1=DC[d1]||'#666', c2=DC[d2]||'#666';
          const shown = arts.slice(0,3);
          return `<div class="collision-card" style="background:${DG[d1]};border-color:${c1}25">
            <div class="collision-pair">
              <span class="domain-name" style="color:${c1}">${l1}</span>
              <span class="x">×</span>
              <span class="domain-name" style="color:${c2}">${l2}</span>
            </div>
            <div class="collision-count">${arts.length} overlapping stories</div>
            <div class="collision-articles">
              ${shown.map(a => `<a class="collision-article" href="${a.url}" target="_blank" rel="noopener">
                <div class="collision-article-title">${esc(a.title)}</div>
                <div class="collision-article-meta">${esc(a.source)}</div>
              </a>`).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

function renderRadar() {
  const el = document.getElementById('radarContainer');
  const srcCounts = {};
  for (const a of articles) srcCounts[a.source] = (srcCounts[a.source]||0)+1;
  const topSrc = Object.keys(srcCounts).sort((a,b)=>srcCounts[b]-srcCounts[a]).slice(0,5);

  const radar = articles.filter(a =>
    a.cross_domain &&
    !topSrc.includes(a.source) &&
    ['lived','analysis','explainer','domain'].includes(a.tier) &&
    !isJunk(a)
  );

  if (!radar.length) { el.innerHTML = ''; return; }

  const shown = radar.slice(0,4);
  el.innerHTML = `
    <div class="section">
      <div class="section-header"><div class="section-title">Under the radar</div></div>
      <div class="section-desc">Stories from outside the mainstream that touch multiple domains. These are the ones worth reading closely.</div>
      <div class="radar-grid">
        ${shown.map(a => {
          const tags = (a.domains||[]).filter(d=>DL[d]).map(d =>
            `<span class="radar-tag" style="background:${DC[d]}">${DL[d]}</span>`
          ).join('');
          const summary = cleanText(a.summary);
          const trimmed = summary.length > 160 ? summary.substring(0,160)+'...' : summary;
          return `<a class="radar-card" href="${a.url}" target="_blank" rel="noopener">
            <div class="radar-tags">${tags}</div>
            <div class="radar-title">${esc(a.title)}</div>
            ${trimmed ? `<div class="radar-summary">${esc(trimmed)}</div>` : ''}
            <div class="radar-meta"><span class="radar-source">${esc(a.source)}</span> · ${a.date}</div>
          </a>`;
        }).join('')}
      </div>
    </div>
  `;
}

function renderFeed() {
  const list = document.getElementById('feedList');
  const filtered = getFiltered();
  const slice = filtered.slice(0, showing);

  document.getElementById('feedCount').textContent = `${filtered.length} articles`;

  if (!slice.length) {
    list.innerHTML = '<div class="empty-state">No articles match this filter.</div>';
    document.getElementById('loadMore').style.display = 'none';
    return;
  }

  list.innerHTML = slice.map(a => {
    const tags = (a.domains||[]).filter(d=>DL[d]).map(d =>
      `<span class="feed-tag" style="background:${DC[d]}">${DL[d]}</span>`
    ).join('');
    return `<a class="feed-item" href="${a.url}" target="_blank" rel="noopener">
      <div>
        <div class="feed-title">${esc(a.title)}</div>
        <div class="feed-meta"><span class="feed-source">${esc(a.source)}</span><span>${a.date}</span></div>
      </div>
      <div class="feed-tags">${tags}</div>
    </a>`;
  }).join('');

  const btn = document.getElementById('loadMore');
  if (filtered.length > showing) {
    btn.style.display = 'block';
    btn.textContent = `Show more (${filtered.length - showing} remaining)`;
    btn.onclick = () => { showing += 50; renderFeed(); };
  } else { btn.style.display = 'none'; }
}

function renderFaq() {
  const el = document.getElementById('faqSection');
  const qs = [
    {
      q: 'What is this?',
      a: 'Signal Board monitors 59 news sources across 10 structural domains and flags the stories that span multiple domains at once. Those overlaps are where the real story usually lives, and they\'re exactly what single-beat reporting tends to miss.'
    },
    {
      q: 'What do the domains mean?',
      a: 'Each domain represents a major structural force: AI, Labor, Governance, Information, Economics, Climate, Security, Geopolitics, Politics, and Legal. When an article touches more than one, it becomes a cross-domain signal. The more domains converge on a single story, the more structurally significant that story is.'
    },
    {
      q: 'Why does this matter?',
      a: 'Most news is organized by beat. A labor reporter covers labor, a climate reporter covers climate. But the forces reshaping the world don\'t stay in those lanes. When a story about federal workers not getting paid connects to an executive order that also affects military readiness, that convergence is invisible to anyone reading one beat at a time. This tool makes it visible.'
    },
    {
      q: 'How does it work?',
      a: 'Every day, Signal Board pulls from RSS feeds spanning national outlets, international coverage, domain-specific publications, explainer journalism, lived experience reporting, and policy analysis. Each article is auto-tagged, and overlaps are flagged. No editorial filtering. The patterns surface on their own.'
    }
  ];

  el.innerHTML = `
    <div class="section-title" style="margin-bottom:0.8rem">Questions</div>
    ${qs.map((item,i) => `
      <div class="faq-item">
        <button class="faq-q" onclick="toggleFaq(${i})">
          <span class="faq-q-text">${esc(item.q)}</span>
          <span class="faq-toggle" id="tog-${i}">+</span>
        </button>
        <div class="faq-a" id="ans-${i}">${esc(item.a)}</div>
      </div>
    `).join('')}
  `;
}

function toggleFaq(i) {
  document.getElementById(`ans-${i}`).classList.toggle('open');
  document.getElementById(`tog-${i}`).classList.toggle('open');
}

function fmtDate(iso) {
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s||'';
  return d.innerHTML;
}

init();
</script>
</body>
</html>
