name: Generate Today Page

on:
  workflow_run:
    workflows: ["Daily Pipeline"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Sync pipeline data to public/
        run: |
          # The pipeline writes to docs/data/daily/.
          # Astro reads from public/data/daily/ at build time.
          mkdir -p public/data/daily
          if [ -f docs/data/daily/latest.json ]; then
            cp docs/data/daily/latest.json public/data/daily/latest.json
            echo "Copied latest.json to public/"
          else
            echo "No pipeline data found. Skipping build."
            exit 1
          fi
          # Copy all dated archives too
          for f in docs/data/daily/2*.json; do
            [ -f "$f" ] && cp "$f" public/data/daily/
          done
          echo "Data synced:"
          ls -la public/data/daily/

      - name: Build with Astro
        run: npx astro build

      - name: Verify output
        run: |
          if [ ! -f docs/today/index.html ]; then
            echo "Build failed - no today page generated"
            exit 1
          fi
          echo "Build output:"
          ls -la docs/today/index.html
          head -5 docs/today/index.html
          echo "---"
          echo "All generated pages:"
          find docs -name "index.html" | head -20

      - name: Commit and push
        run: |
          git config user.name "Signal Board Bot"
          git config user.email "bot@signalboard.org"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build today page for $(date +%Y-%m-%d)"
            git push
          fi
