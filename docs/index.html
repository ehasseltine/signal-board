<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Signal Board shows how today's biggest news stories connect to each other in ways most coverage misses.">
<meta property="og:title" content="Signal Board">
<meta property="og:description" content="See where today's news stories collide. The connections most coverage misses.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://elisehasseltine.com/signal-board/">
<title>Signal Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #131316;
    --surface-hover: #1a1a1f;
    --border: #1f1f25;
    --text: #e8e8e8;
    --text-dim: rgba(235,230,245,0.45);
    --text-mid: rgba(235,230,245,0.7);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── HEADER ─── */
  .header {
    max-width: 720px;
    margin: 0 auto;
    padding: 3.5rem 1.5rem 1.5rem;
    text-align: center;
  }
  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(2.2rem, 6vw, 3rem);
    font-weight: 700;
    letter-spacing: -0.04em;
    color: #fff;
    margin-bottom: 0.5rem;
  }
  .header p {
    color: var(--text-mid);
    font-size: 1rem;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.65;
  }

  /* ─── COLOR BAR ─── */
  .bar-wrap {
    max-width: 720px;
    margin: 1.5rem auto 0.4rem;
    padding: 0 1.5rem;
  }
  .color-bar {
    display: flex;
    height: 14px;
    border-radius: 7px;
    overflow: hidden;
    gap: 2px;
  }
  .bar-seg {
    border-radius: 3px;
    cursor: pointer;
    transition: transform 0.2s, filter 0.2s;
    position: relative;
  }
  .bar-seg:hover { filter: brightness(1.3); transform: scaleY(1.8); z-index: 2; }
  .bar-tip {
    display: none;
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%);
    background: #1c1c22;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 0.5rem 0.75rem;
    border-radius: 8px;
    font-size: 0.72rem;
    white-space: nowrap;
    color: var(--text);
    z-index: 100;
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .bar-tip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: #1c1c22;
  }
  .bar-seg:hover .bar-tip { display: block; }
  .bar-legend {
    max-width: 720px;
    margin: 0 auto 2.5rem;
    padding: 0 1.5rem;
    display: flex;
    justify-content: center;
    gap: 0.8rem;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.62rem;
    color: var(--text-dim);
    cursor: default;
    position: relative;
  }
  .legend-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .legend-item .term-def {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: #1c1c22;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 0.5rem 0.7rem;
    border-radius: 8px;
    font-size: 0.68rem;
    line-height: 1.45;
    color: var(--text);
    width: max-content;
    max-width: 240px;
    z-index: 100;
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    white-space: normal;
  }
  .term-def::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: #1c1c22;
  }
  .legend-item:hover .term-def { display: block; }
  .legend-item:hover { color: #fff; }

  /* ─── COLLISIONS ─── */
  .collisions {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 1.5rem 2rem;
  }
  .collisions-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 0.3rem;
    letter-spacing: -0.02em;
  }
  .collisions-sub {
    font-size: 0.82rem;
    color: var(--text-dim);
    margin-bottom: 1.2rem;
    line-height: 1.6;
    max-width: 520px;
  }
  .card {
    border-radius: 14px;
    padding: 1.2rem 1.3rem;
    margin-bottom: 0.75rem;
    transition: transform 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card:hover { transform: translateY(-2px); }
  .card-pair {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.15rem;
  }
  .card-pair .dn {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
  }
  .card-pair .x { font-size: 0.7rem; color: rgba(255,255,255,0.25); font-weight: 700; }
  .card-pair .ct {
    margin-left: auto;
    font-size: 0.58rem;
    color: rgba(255,255,255,0.3);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    background: rgba(255,255,255,0.05);
    padding: 0.12rem 0.45rem;
    border-radius: 100px;
  }
  .card-why {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.5);
    margin-bottom: 0.8rem;
    line-height: 1.5;
  }
  .card-stories { display: flex; flex-direction: column; gap: 0.4rem; }
  .card-story {
    display: block;
    text-decoration: none;
    color: inherit;
    padding: 0.5rem 0.6rem;
    background: rgba(0,0,0,0.25);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.03);
    transition: background 0.15s, transform 0.12s;
  }
  .card-story:hover { background: rgba(0,0,0,0.4); transform: translateX(3px); }
  .card-story-title {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.88);
    line-height: 1.4;
    font-weight: 500;
  }
  .card-story-conn {
    font-size: 0.68rem;
    color: rgba(255,255,255,0.4);
    margin-top: 0.1rem;
    font-style: italic;
  }
  .card-story-src {
    font-size: 0.6rem;
    color: rgba(255,255,255,0.28);
    margin-top: 0.1rem;
  }

  /* ─── UNDER THE RADAR ─── */
  .radar {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 1.5rem 2rem;
  }
  .rtitle {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 0.3rem;
  }
  .rsub {
    font-size: 0.82rem;
    color: var(--text-dim);
    margin-bottom: 1.2rem;
    line-height: 1.6;
  }
  .radar-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    margin-bottom: 0.6rem;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: transform 0.2s, border-color 0.2s;
  }
  .radar-item:hover { transform: translateY(-1px); border-color: rgba(255,255,255,0.1); }
  .radar-tags { display: flex; gap: 0.25rem; margin-bottom: 0.4rem; flex-wrap: wrap; }
  .radar-tag {
    padding: 0.12rem 0.5rem;
    border-radius: 100px;
    font-size: 0.58rem;
    font-weight: 700;
    color: rgba(0,0,0,0.9);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .radar-headline {
    font-size: 0.88rem;
    font-weight: 600;
    line-height: 1.38;
    margin-bottom: 0.2rem;
  }
  .radar-conn {
    font-size: 0.76rem;
    color: #6652FF;
    font-weight: 500;
    margin-bottom: 0.3rem;
    line-height: 1.45;
  }
  .radar-src {
    font-size: 0.65rem;
    color: var(--text-dim);
  }

  /* ─── BOTTOM ─── */
  .bottom {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 1.5rem 2rem;
    text-align: center;
  }
  .bottom-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    color: #fff;
    text-decoration: none;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 0.7rem 1.6rem;
    border: 1.5px solid rgba(102,82,255,0.4);
    border-radius: 100px;
    transition: all 0.2s;
    background: rgba(102,82,255,0.06);
  }
  .bottom-link:hover { border-color: #6652FF; background: rgba(102,82,255,0.12); transform: translateY(-1px); }

  /* ─── FOOTER ─── */
  .footer {
    max-width: 720px;
    margin: 0 auto;
    padding: 1.2rem 1.5rem 2rem;
    border-top: 1px solid var(--border);
    font-size: 0.68rem;
    color: var(--text-dim);
    text-align: center;
  }
  .footer a { color: #6652FF; text-decoration: none; }

  @media (max-width: 600px) {
    .header, .bar-wrap, .bar-legend, .collisions, .radar, .bottom, .footer {
      padding-left: 1rem; padding-right: 1rem;
    }
    .header h1 { font-size: 2rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Signal Board</h1>
  <p>The news covers stories one at a time, but the world doesn't work that way. This shows you where today's stories overlap.</p>
</div>

<div class="bar-wrap"><div class="color-bar" id="colorBar"></div></div>
<div class="bar-legend" id="legend"></div>

<div class="collisions" id="collisions"></div>
<div class="radar" id="radar"></div>

<div class="bottom">
  <a href="./explore/" class="bottom-link">See all <span id="totalCount"></span> stories &rarr;</a>
</div>

<div class="footer">
  <span id="srcCount"></span> sources · Updated daily
</div>

<script>
const DC = {
  ai:'#6652FF', labor:'#FF5400', governance:'#FF0054', information:'#9E0059',
  economics:'#00C2A8', climate:'#4CAF50', security:'#D32F2F',
  geopolitics:'#1976D2', domestic_politics:'#7B1FA2', legal:'#FF9800'
};
const DL = {
  ai:'AI', labor:'Labor', governance:'Governance', information:'Information',
  economics:'Economics', climate:'Climate', security:'Security',
  geopolitics:'Geopolitics', domestic_politics:'Politics', legal:'Legal'
};
const DD = {
  ai:'Artificial intelligence and automation',
  labor:'Jobs, workers, pay, and working conditions',
  governance:'Government agencies, executive actions, and public services',
  information:'Media, data, tech platforms, and how information spreads',
  economics:'Markets, prices, trade, and the economy',
  climate:'Environment, energy, and the effects of climate change',
  security:'Military, defense, policing, and threats to safety',
  geopolitics:'Relationships and tensions between countries',
  domestic_politics:'U.S. political parties, elections, and policy fights',
  legal:'Courts, laws, enforcement, and legal rights'
};
const PE = {
  'governance+legal':'Government actions running into the courts. Laws being written, challenged, or struck down.',
  'geopolitics+security':'Tensions between countries that affect military action and safety worldwide.',
  'domestic_politics+security':'Political decisions that directly affect defense, policing, or public safety.',
  'economics+security':'When conflict and military spending hit markets, prices, and people\'s wallets.',
  'climate+security':'How environmental change and resource scarcity create security threats.',
  'climate+economics':'Environmental shifts that affect energy costs, food prices, and jobs.',
  'ai+labor':'How automation and AI are changing the jobs people do and how they\'re paid.',
  'ai+governance':'How governments are trying to regulate AI, and what that means for everyone.',
  'ai+economics':'AI\'s effect on markets, investment, and who profits from new technology.',
  'ai+information':'How AI is changing what information people see, trust, and share.',
  'ai+security':'AI being used in military, surveillance, and cybersecurity.',
  'governance+domestic_politics':'Political battles over how government agencies are run and what they do.',
  'governance+economics':'Government spending and regulation shaping everyday costs.',
  'governance+information':'How government controls or shapes what information the public gets.',
  'governance+climate':'Government environmental policy and climate regulation.',
  'governance+labor':'Government policy on workers\' rights, benefits, and workplace rules.',
  'governance+geopolitics':'Foreign policy decisions and their global impact.',
  'domestic_politics+legal':'Political battles playing out in courts or through new laws.',
  'domestic_politics+economics':'How political decisions directly affect the economy, jobs, and prices.',
  'domestic_politics+information':'How politics shapes media coverage and what people trust.',
  'economics+legal':'Business regulation, antitrust, and how the legal system shapes markets.',
  'economics+labor':'How economic conditions affect wages, jobs, and cost of living.',
  'economics+geopolitics':'How international relationships affect trade, prices, and the global economy.',
  'economics+information':'How tech platforms and media shape markets and economic decisions.',
  'information+security':'Surveillance, data privacy, hacking, and digital threats.',
  'information+legal':'Tech regulation, free speech law, and who controls what you see online.',
  'information+domestic_politics':'How media and misinformation shape political outcomes.',
  'labor+legal':'Workers\' rights, pay disputes, unions, and employment law.',
  'labor+economics':'How economic conditions affect wages and whether people can afford to live.',
  'labor+domestic_politics':'Political battles over workers\' rights and labor protections.',
  'climate+geopolitics':'How climate change and energy competition shape relations between countries.',
  'climate+legal':'Environmental lawsuits and climate-related court battles.',
  'climate+information':'How climate science is communicated, denied, or distorted.',
  'climate+labor':'How environmental shifts affect jobs in energy, agriculture, and industry.',
  'legal+security':'Law enforcement, civil rights, and the justice system.',
  'legal+geopolitics':'International law, war crimes, treaties, and cross-border legal disputes.',
  'geopolitics+domestic_politics':'How foreign policy and international tensions play out in U.S. politics.',
  'geopolitics+information':'Propaganda, foreign influence, and how countries fight through information.',
  'security+legal':'Law enforcement, civil rights, surveillance law, and the justice system.'
};
const DG = {};
for (const [k,c] of Object.entries(DC)) {
  const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  DG[k]=`linear-gradient(135deg,rgba(${r},${g},${b},0.18) 0%,rgba(${r},${g},${b},0.04) 100%)`;
}
const JUNK=[/\bsmart lock\b/i,/\bsmart home\b/i,/\bproduct review\b/i,/\bbest .{0,20}(buy|deal|price|sale)\b/i,/\bcoupon\b/i,/\bgadget\b/i,/\bunboxing\b/i,/\bhoroscope\b/i,/\brecipe\b/i];

let articles=[], stats={};

async function init(){
  try {
    const cb='?v='+Date.now();
    let r;
    try { r=await fetch('./data/articles.json'+cb); if(!r.ok) throw 0; }
    catch { r=await fetch('../data/articles.json'+cb); }
    const d=await r.json();
    articles=d.articles||[];
    stats=d.stats||{};
    document.getElementById('srcCount').textContent=(stats.total_sources||stats.source_count||59)+' sources';
    document.getElementById('totalCount').textContent=stats.total_articles||articles.length;
    render();
  } catch(e){ console.error(e); }
}

function render(){
  renderBar();
  renderLegend();
  renderCollisions();
  renderRadar();
}

function renderBar(){
  const bar=document.getElementById('colorBar');
  const counts={};
  for(const a of articles) for(const d of(a.domains||[])) counts[d]=(counts[d]||0)+1;
  const total=Object.values(counts).reduce((s,c)=>s+c,0);
  if(!total) return;
  bar.innerHTML=Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([k,c])=>{
    const pct=Math.max((c/total)*100,3);
    return `<div class="bar-seg" style="width:${pct}%;background:${DC[k]||'#666'}">
      <div class="bar-tip"><strong style="color:#fff">${DL[k]||k}</strong> · ${c} stories</div>
    </div>`;
  }).join('');
}

function renderLegend(){
  document.getElementById('legend').innerHTML=Object.entries(DL).map(([k,l])=>
    `<div class="legend-item"><span class="legend-dot" style="background:${DC[k]}"></span>${l}<div class="term-def">${DD[k]}</div></div>`
  ).join('');
}

function pairKey(d1,d2){ return PE[d1+'+'+d2]||PE[d2+'+'+d1]||`Stories where ${DL[d1]} and ${DL[d2]} overlap.`; }

function renderCollisions(){
  const el=document.getElementById('collisions');
  const pairs={};
  for(const a of articles){
    if(a.cross_domain&&a.domains&&a.domains.length>=2){
      const ds=[...a.domains].sort();
      for(let i=0;i<ds.length;i++) for(let j=i+1;j<ds.length;j++){
        const k=ds[i]+'+'+ds[j];
        if(!pairs[k]) pairs[k]=[];
        pairs[k].push(a);
      }
    }
  }
  const top=Object.entries(pairs).sort((a,b)=>b[1].length-a[1].length).slice(0,3);
  if(!top.length){ el.innerHTML=''; return; }

  el.innerHTML=`
    <div class="collisions-title">Today's biggest collisions</div>
    <div class="collisions-sub">When a story touches two worlds at once, that's usually where the most important thing is happening.</div>
    ${top.map(([pk,arts])=>{
      const [d1,d2]=pk.split('+');
      const c1=DC[d1]||'#666', c2=DC[d2]||'#666';
      const shown=arts.slice(0,3);
      return `<div class="card" style="background:${DG[d1]};border:1px solid ${c1}18">
        <div class="card-pair">
          <span class="dn" style="color:${c1}">${DL[d1]}</span>
          <span class="x">+</span>
          <span class="dn" style="color:${c2}">${DL[d2]}</span>
          <span class="ct">${arts.length} stories</span>
        </div>
        <div class="card-why">${pairKey(d1,d2)}</div>
        <div class="card-stories">
          ${shown.map(a=>`<a class="card-story" href="${a.url}" target="_blank" rel="noopener">
            <div class="card-story-title">${esc(a.title)}</div>
            ${a.connection?`<div class="card-story-conn">${esc(a.connection)}</div>`:''}
            <div class="card-story-src">${esc(a.source)} · ${a.date}</div>
          </a>`).join('')}
        </div>
      </div>`;
    }).join('')}
  `;
}

function renderRadar(){
  const el=document.getElementById('radar');
  const srcCounts={};
  for(const a of articles) srcCounts[a.source]=(srcCounts[a.source]||0)+1;
  const topSrc=Object.keys(srcCounts).sort((a,b)=>srcCounts[b]-srcCounts[a]).slice(0,5);
  const radar=articles.filter(a=>
    a.cross_domain&&!topSrc.includes(a.source)&&
    ['lived','analysis','explainer','domain'].includes(a.tier)&&
    !JUNK.some(p=>p.test((a.title+' '+(a.summary||''))))
  ).slice(0,3);
  if(!radar.length){ el.innerHTML=''; return; }

  el.innerHTML=`
    <div class="rtitle">Under the radar</div>
    <div class="rsub">Important stories from smaller outlets most people won't see.</div>
    ${radar.map(a=>{
      const tags=(a.domains||[]).filter(d=>DL[d]).map(d=>
        `<span class="radar-tag" style="background:${DC[d]}">${DL[d]}</span>`
      ).join('');
      const why=a.connection||'';
      return `<a class="radar-item" href="${a.url}" target="_blank" rel="noopener">
        <div class="radar-tags">${tags}</div>
        <div class="radar-headline">${esc(a.title)}</div>
        ${why?`<div class="radar-conn">${esc(why)}</div>`:''}
        <div class="radar-src">${esc(a.source)} · ${a.date}</div>
      </a>`;
    }).join('')}
  `;
}

function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

init();
</script>
</body>
</html>
