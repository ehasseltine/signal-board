name: Daily Ingest

on:
  schedule:
    # Run every day at 7am UTC (midnight PT / 3am ET)
    - cron: '0 7 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run ingest
        working-directory: actions
        run: python ingest.py

      - name: Copy data to docs for GitHub Pages
        run: |
          mkdir -p docs/data
          cp data/articles.json docs/data/articles.json

      - name: Commit and push
        run: |
          git config user.name "Signal Board Bot"
          git config user.email "bot@signal-board"
          git add data/articles.json docs/data/articles.json
          git diff --staged --quiet || git commit -m "ingest: $(date -u +%Y-%m-%d) — $(python3 -c "
          import json
          with open('data/articles.json') as f:
            d = json.load(f)
          s = d.get('stats', {})
          print(f\"{s.get('total_articles', 0)} articles, {s.get('cross_domain_count', 0)} cross-domain\")
          ")"
          git push
