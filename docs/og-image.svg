<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f0f14"/>

  <!-- Subtle accent pattern (dots) -->
  <defs>
    <pattern id="dotPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#6652FF" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dotPattern)"/>

  <!-- Accent line at top -->
  <line x1="150" y1="80" x2="1050" y2="80" stroke="#6652FF" stroke-width="2" opacity="0.5"/>

  <!-- Main title -->
  <text
    x="600"
    y="300"
    font-family="Space Grotesk, monospace"
    font-size="96"
    font-weight="700"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="2"
  >SIGNAL BOARD</text>

  <!-- Tagline -->
  <text
    x="600"
    y="380"
    font-family="Space Grotesk, monospace"
    font-size="28"
    font-weight="400"
    fill="#6652FF"
    text-anchor="middle"
    opacity="0.9"
  >239 sources. One connected picture.</text>

  <!-- Accent line at bottom -->
  <line x1="150" y1="550" x2="1050" y2="550" stroke="#6652FF" stroke-width="2" opacity="0.5"/>
</svg>
