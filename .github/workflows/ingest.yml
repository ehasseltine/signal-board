name: Daily Ingest

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser anthropic

      - name: Run ingest
        working-directory: actions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python ingest.py

      - name: Copy data to docs for GitHub Pages
        run: |
          mkdir -p docs/data
          cp data/articles.json docs/data/articles.json

      - name: Commit and push
        run: |
          git config user.name "Signal Board Bot"
          git config user.email "bot@signal-board"
          git add data/articles.json docs/data/articles.json
          git diff --staged --quiet || git commit -m "ingest: $(date -u +%Y-%m-%d)"
          git push
