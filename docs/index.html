{
  "@context": "https://schema.org",

  "name": "Signal Board",
  "description": "A research tool that tracks how interconnected forces appear in the news and surfaces the structural connections between them that most coverage misses.",

<title>Signal Board — Structural Connections in the News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-hover: #1a1a1a;
    --border: #222;
    --text: #e8e8e8;
    --text-dim: rgba(235,230,245,0.55);
    --text-mid: rgba(235,230,245,0.8);
    --purple: #6652FF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ─── HEADER ─── */
  .header {
    padding: 3rem 2rem 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
  }
  .header h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 2.2rem;
    letter-spacing: -0.03em;
    margin-bottom: 0.4rem;
    background: linear-gradient(135deg, #fff 0%, rgba(235,230,245,0.7) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .tagline {
    color: var(--text-dim);
    font-size: 0.88rem;
    max-width: 520px;
  }
  .header .meta {
    margin-top: 1rem;
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }
  .meta-pill {
    padding: 0.3rem 0.7rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.72rem;
    color: var(--text-dim);
  }
  .meta-pill strong {
    color: var(--text-mid);
    font-weight: 600;
  }
  .header-divider {
    height: 1px;
    background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
    margin-top: 1.5rem;
    max-width: 1400px;
    margin-left: auto;
    margin-right: auto;
  }

  /* ─── MAIN LAYOUT ─── */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.5rem 2rem;
  }

  /* ─── SECTION HEADERS ─── */
  .section-label {
    font-family: 'Archivo Black', sans-serif;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-bottom: 1rem;
  }

  /* ─── DOMAIN HEAT BAR ─── */
  .heat-section { margin-bottom: 2rem; }
  .heat-bar {
    display: flex;
    height: 44px;
    border-radius: 8px;
    overflow: hidden;
    gap: 2px;
  }
  .heat-segment {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.68rem;
    font-weight: 700;
    color: rgba(0,0,0,0.75);
    cursor: pointer;
    transition: all 0.25s ease;
    min-width: 40px;
    position: relative;
  }
  .heat-segment:hover {
    filter: brightness(1.15);
    transform: scaleY(1.08);
  }
  .heat-segment .seg-label {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 0.4rem;
  }

  /* ─── HOT TOPICS ─── */
  .hot-topics-section { margin-bottom: 2.5rem; }
  .hot-topics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 0.8rem;
  }
  .hot-topic-card {
    position: relative;
    border-radius: 10px;
    padding: 1.2rem 1.2rem 1rem;
    cursor: default;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .hot-topic-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .hot-topic-pair {
    font-family: 'Archivo Black', sans-serif;
    font-size: 0.95rem;
    color: #fff;
    margin-bottom: 0.15rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .hot-topic-pair .pair-connector {
    font-size: 0.75rem;
    opacity: 0.6;
  }
  .hot-topic-count {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.5);
    margin-bottom: 0.8rem;
  }
  .hot-topic-articles { display: flex; flex-direction: column; gap: 0.5rem; }
  .hot-topic-article {
    padding: 0.5rem 0.6rem;
    background: rgba(0,0,0,0.2);
    border-radius: 6px;
    transition: background 0.15s;
  }
  .hot-topic-article:hover { background: rgba(0,0,0,0.35); }
  .hot-topic-article a {
    text-decoration: none;
    color: inherit;
  }
  .hot-topic-article-title {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.9);
    line-height: 1.35;
    font-weight: 500;
  }
  .hot-topic-article-meta {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.4);
    margin-top: 0.15rem;
  }

  /* ─── UNDER THE RADAR ─── */
  .radar-section { margin-bottom: 2.5rem; }
  .radar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 0.8rem;
  }
  .radar-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.1rem 1.2rem;
    transition: transform 0.2s ease, border-color 0.2s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .radar-card:hover {
    transform: translateY(-1px);
    border-color: rgba(255,255,255,0.1);
  }
  .radar-card-tags {
    display: flex;
    gap: 0.35rem;
    flex-wrap: wrap;
    margin-bottom: 0.7rem;
  }
  .radar-domain-tag {
    padding: 0.15rem 0.55rem;
    border-radius: 3px;
    font-size: 0.6rem;
    font-weight: 700;
    color: rgba(0,0,0,0.85);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .radar-card-title {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.5rem;
    line-height: 1.35;
  }
  .radar-card-summary {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-bottom: 0.7rem;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .radar-card-meta {
    display: flex;
    gap: 0.6rem;
    font-size: 0.7rem;
    color: var(--text-dim);
  }
  .radar-card-source { font-weight: 600; color: var(--text-mid); }

  /* ─── FILTER TABS ─── */
  .filters {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 0.35rem 0.8rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .filter-btn.active { background: var(--purple); border-color: var(--purple); color: #fff; }
  .filter-btn.active-cross { background: #fff; border-color: #fff; color: #000; }

  /* ─── TIER TABS ─── */
  .tier-filters {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .tier-btn {
    padding: 0.3rem 0.7rem;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tier-btn:hover { border-color: var(--text-dim); }
  .tier-btn.active { background: var(--surface); border-color: var(--text-dim); color: var(--text); }

  /* ─── CROSS-DOMAIN CLUSTERS ─── */
  .cross-section { margin-bottom: 2.5rem; }
  .cluster-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 0.8rem;
  }
  .cluster-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    transition: border-color 0.2s;
  }
  .cluster-card:hover { border-color: rgba(255,255,255,0.08); }
  .cluster-header {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.7rem;
  }
  .cluster-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cluster-label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text);
  }
  .cluster-count {
    font-size: 0.65rem;
    color: var(--text-dim);
    margin-left: auto;
  }
  .cluster-articles { display: flex; flex-direction: column; gap: 1px; }
  .cluster-article {
    display: block;
    text-decoration: none;
    color: var(--text);
    padding: 0.45rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: color 0.15s;
  }
  .cluster-article:last-child { border-bottom: none; }
  .cluster-article:hover { color: #fff; }
  .cluster-article-title { font-size: 0.8rem; line-height: 1.4; }
  .cluster-article-meta { font-size: 0.65rem; color: var(--text-dim); margin-top: 0.1rem; }

  /* ─── ARTICLE LIST ─── */
  .articles-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.8rem;
  }
  .articles-header h2 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
  }
  .articles-count { font-size: 0.7rem; color: var(--text-dim); }

  .article-list { display: flex; flex-direction: column; gap: 1px; }
  .article-card {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 1rem;
    align-items: start;
    padding: 0.8rem 1rem;
    background: var(--surface);
    border-radius: 4px;
    text-decoration: none;
    color: var(--text);
    transition: background 0.15s;
  }
  .article-card:hover { background: var(--surface-hover); }
  .article-title { font-size: 0.85rem; font-weight: 500; line-height: 1.4; }
  .article-meta {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    margin-top: 0.25rem;
    font-size: 0.7rem;
    color: var(--text-dim);
  }
  .article-source { font-weight: 600; color: var(--text-mid); }

  .domain-tags {
    display: flex;
    gap: 0.25rem;
    flex-shrink: 0;
    align-self: center;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .domain-tag {
    padding: 0.12rem 0.45rem;
    border-radius: 3px;
    font-size: 0.6rem;
    font-weight: 700;
    color: rgba(0,0,0,0.85);
    white-space: nowrap;
  }

  .load-more {
    display: block;
    width: 100%;
    padding: 0.7rem;
    margin-top: 0.5rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .load-more:hover { border-color: var(--text-dim); color: var(--text); }

  /* ─── FAQ ─── */
  .faq-section { margin-bottom: 3rem; max-width: 760px; }
  .faq-item { margin-bottom: 0.6rem; }
  .faq-question {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.9rem 1rem;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.2s;
  }
  .faq-question:hover { background: var(--surface-hover); }
  .faq-question-text { font-size: 0.85rem; font-weight: 500; color: var(--text); }
  .faq-toggle {
    font-size: 1.1rem;
    color: var(--text-dim);
    transition: transform 0.2s;
    flex-shrink: 0;
    margin-left: 0.5rem;
  }
  .faq-toggle.open { transform: rotate(45deg); }
  .faq-answer {
    background: rgba(20,20,20,0.6);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    padding: 0.9rem 1rem;
    font-size: 0.82rem;
    line-height: 1.6;
    color: var(--text-dim);
    display: none;
  }
  .faq-answer.open { display: block; }

  /* ─── FOOTER ─── */
  .footer {
    max-width: 1400px;
    margin: 2rem auto 2rem;
    padding: 1.5rem 2rem;
    border-top: 1px solid var(--border);
    font-size: 0.72rem;
    color: var(--text-dim);
  }
  .footer a { color: var(--purple); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
  .footer-meta { margin-top: 0.4rem; font-size: 0.65rem; }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    text-align: center;
    padding: 2rem;
    color: var(--text-dim);
    font-size: 0.85rem;
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    .header, .main, .footer { padding-left: 1rem; padding-right: 1rem; }
    .header h1 { font-size: 1.6rem; }
    .article-card { grid-template-columns: 1fr; }
    .domain-tags { margin-top: 0.4rem; }
    .cluster-grid { grid-template-columns: 1fr; }
    .hot-topics-grid { grid-template-columns: 1fr; }
    .radar-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Signal Board</h1>
  <p class="tagline">Surfacing the structural connections most coverage misses.</p>
  <div class="meta" id="meta"></div>
</div>
<div class="header-divider"></div>

<div class="main">
  <div class="heat-section">
    <div class="section-label" id="heatLabel">Domain activity</div>
    <div class="heat-bar" id="heatBar"></div>
  </div>

  <div class="filters" id="filters"></div>
  <div class="tier-filters" id="tierFilters"></div>

  <div id="hotTopicsContainer"></div>
  <div id="radarContainer"></div>

  <div class="cross-section" id="crossSection">
    <div class="section-label">Where domains intersect</div>
    <div class="cluster-grid" id="clusterGrid"></div>
  </div>

  <div>
    <div class="articles-header">
      <h2>All articles</h2>
      <span class="articles-count" id="articlesCount"></span>
    </div>
    <div class="article-list" id="articleList"></div>
    <button class="load-more" id="loadMore" style="display:none">Load more</button>
  </div>

  <div class="faq-section" id="faqSection"></div>
</div>

<div class="footer">
  Built by <a href="https://www.elisehasseltine.com/">Elise Hasseltine</a>.
  <div class="footer-meta">59 sources · 10 domains · Updated daily</div>
</div>

<script>
const DOMAIN_COLORS = {
  ai: '#6652FF',
  labor: '#FF5400',
  governance: '#FF0054',
  information: '#9E0059',
  economics: '#00C2A8',
  climate: '#4CAF50',
  security: '#D32F2F',
  geopolitics: '#1976D2',
  domestic_politics: '#7B1FA2',
  legal: '#FF9800',
};
const DOMAIN_LABELS = {
  ai: 'AI',
  labor: 'Labor',
  governance: 'Governance',
  information: 'Information',
  economics: 'Economics',
  climate: 'Climate',
  security: 'Security',
  geopolitics: 'Geopolitics',
  domestic_politics: 'Politics',
  legal: 'Legal',
};

// Gradient backgrounds for hot topic cards — keyed by first domain
const DOMAIN_GRADIENTS = {
  ai: 'linear-gradient(135deg, rgba(102,82,255,0.25) 0%, rgba(102,82,255,0.08) 100%)',
  labor: 'linear-gradient(135deg, rgba(255,84,0,0.25) 0%, rgba(255,84,0,0.08) 100%)',
  governance: 'linear-gradient(135deg, rgba(255,0,84,0.25) 0%, rgba(255,0,84,0.08) 100%)',
  information: 'linear-gradient(135deg, rgba(158,0,89,0.25) 0%, rgba(158,0,89,0.08) 100%)',
  economics: 'linear-gradient(135deg, rgba(0,194,168,0.25) 0%, rgba(0,194,168,0.08) 100%)',
  climate: 'linear-gradient(135deg, rgba(76,175,80,0.25) 0%, rgba(76,175,80,0.08) 100%)',
  security: 'linear-gradient(135deg, rgba(211,47,47,0.25) 0%, rgba(211,47,47,0.08) 100%)',
  geopolitics: 'linear-gradient(135deg, rgba(25,118,210,0.25) 0%, rgba(25,118,210,0.08) 100%)',
  domestic_politics: 'linear-gradient(135deg, rgba(123,31,162,0.25) 0%, rgba(123,31,162,0.08) 100%)',
  legal: 'linear-gradient(135deg, rgba(255,152,0,0.25) 0%, rgba(255,152,0,0.08) 100%)',
};

// Words that indicate consumer product/lifestyle junk
const JUNK_PATTERNS = [
  /\bsmart lock\b/i, /\bsmart home\b/i, /\bproduct review\b/i,
  /\bbest .{0,20}(buy|deal|price|sale)\b/i, /\bcoupon\b/i, /\bdiscount code\b/i,
  /\bgadget\b/i, /\bunboxing\b/i, /\bvs\.\b/i, /\brating\b/i,
  /\bhoroscope\b/i, /\bcelebrity\b/i, /\brecipe\b/i,
];

let allArticles = [];
let stats = {};
let activeFilter = 'all';
let activeTier = 'all';
let displayCount = 50;

async function init() {
  try {
    const cb = '?v=' + Date.now();
    let resp;
    try {
      resp = await fetch('./data/articles.json' + cb);
      if (!resp.ok) throw new Error();
    } catch {
      resp = await fetch('../data/articles.json' + cb);
    }
    const data = await resp.json();
    allArticles = data.articles || [];
    stats = data.stats || {};

    document.getElementById('meta').innerHTML = `
      <span class="meta-pill"><strong>${stats.total_articles || 0}</strong>&nbsp;articles</span>
      <span class="meta-pill"><strong>${stats.total_sources || 0}</strong>&nbsp;sources</span>
      <span class="meta-pill"><strong>${stats.cross_domain_count || 0}</strong>&nbsp;cross-domain</span>
      <span class="meta-pill">Updated ${formatDate(data.last_updated)}</span>
    `;

    renderAll();
  } catch (e) {
    document.getElementById('articleList').innerHTML =
      '<div class="empty-state">No data yet. Run the ingest to populate.</div>';
    console.error(e);
  }
}

function renderAll() {
  renderHeatBar();
  renderFilters();
  renderTierFilters();
  renderHotTopics();
  renderRadar();
  renderClusters();
  renderArticles();
  renderFaq();
}

function renderHeatBar() {
  const bar = document.getElementById('heatBar');
  const label = document.getElementById('heatLabel');

  const filtered = getBaseFiltered();
  const domainCounts = {};
  for (const a of filtered) {
    for (const d of (a.domains || [])) {
      domainCounts[d] = (domainCounts[d] || 0) + 1;
    }
  }

  const total = Object.values(domainCounts).reduce((s, c) => s + c, 0);
  if (total === 0) {
    bar.innerHTML = '<div class="empty-state" style="padding:0.5rem">No tagged articles match filters</div>';
    return;
  }

  const tierLabel = activeTier === 'all' ? '' : ` — ${activeTier}`;
  label.textContent = `Domain activity${tierLabel}`;

  bar.innerHTML = Object.entries(domainCounts)
    .sort((a, b) => b[1] - a[1])
    .map(([key, count]) => {
      const pct = Math.max((count / total) * 100, 4);
      const color = DOMAIN_COLORS[key] || '#666';
      const name = DOMAIN_LABELS[key] || key;
      return `<div class="heat-segment" style="width:${pct}%;background:${color}"
                   onclick="setFilter('${key}')" title="${name}: ${count}">
        <span class="seg-label">${name} ${count}</span>
      </div>`;
    }).join('');
}

function getBaseFiltered() {
  let articles = allArticles;
  if (activeTier !== 'all') {
    articles = articles.filter(a => a.tier === activeTier);
  }
  return articles;
}

function renderFilters() {
  const container = document.getElementById('filters');
  let html = `<button class="filter-btn ${activeFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All</button>`;
  html += `<button class="filter-btn ${activeFilter === 'cross' ? 'active-cross' : ''}" onclick="setFilter('cross')">Cross-domain</button>`;

  for (const [key, label] of Object.entries(DOMAIN_LABELS)) {
    const isActive = activeFilter === key;
    html += `<button class="filter-btn" onclick="setFilter('${key}')"
      style="${isActive ? `background:${DOMAIN_COLORS[key]};border-color:${DOMAIN_COLORS[key]};color:rgba(0,0,0,0.85)` : ''}"
    >${label}</button>`;
  }
  container.innerHTML = html;
}

function renderTierFilters() {
  const container = document.getElementById('tierFilters');
  const tiers = [
    ['all', 'All sources'],
    ['national', 'US National'],
    ['international', 'International'],
    ['domain', 'Domain-specific'],
    ['explainer', 'Explainer'],
    ['lived', 'Lived experience'],
    ['analysis', 'Analysis'],
  ];
  container.innerHTML = tiers.map(([key, label]) =>
    `<button class="tier-btn ${activeTier === key ? 'active' : ''}" onclick="setTier('${key}')">${label}</button>`
  ).join('');
}

function setFilter(f) {
  activeFilter = f;
  displayCount = 50;
  renderFilters();
  renderArticles();

  const crossSection = document.getElementById('crossSection');
  crossSection.style.display = f === 'all' || f === 'cross' ? 'block' : 'none';
}

function setTier(t) {
  activeTier = t;
  displayCount = 50;
  renderAll();
}

function getFiltered() {
  let articles = getBaseFiltered();
  if (activeFilter === 'cross') {
    articles = articles.filter(a => a.cross_domain);
  } else if (activeFilter !== 'all') {
    articles = articles.filter(a => a.domains && a.domains.includes(activeFilter));
  }
  return articles;
}

function isJunkArticle(a) {
  const text = (a.title + ' ' + (a.summary || '')).toLowerCase();
  return JUNK_PATTERNS.some(p => p.test(text));
}

function decodeEntities(str) {
  if (!str) return '';
  const ta = document.createElement('textarea');
  ta.innerHTML = str;
  return ta.value;
}

function cleanSummary(str) {
  if (!str) return '';
  let s = decodeEntities(str);
  // Clean leftover HTML artifacts
  s = s.replace(/<[^>]+>/g, ' ');
  s = s.replace(/\s+/g, ' ').trim();
  return s;
}

function renderHotTopics() {
  const container = document.getElementById('hotTopicsContainer');
  const base = getBaseFiltered();

  const pairs = {};
  for (const a of base) {
    if (a.cross_domain && a.domains && a.domains.length >= 2) {
      const domains = [...a.domains].sort();
      for (let i = 0; i < domains.length; i++) {
        for (let j = i + 1; j < domains.length; j++) {
          const key = domains[i] + '+' + domains[j];
          if (!pairs[key]) pairs[key] = [];
          pairs[key].push(a);
        }
      }
    }
  }

  const topPairs = Object.entries(pairs)
    .sort((a, b) => b[1].length - a[1].length)
    .slice(0, 4);

  if (topPairs.length === 0) { container.innerHTML = ''; return; }

  const html = `
    <div class="hot-topics-section">
      <div class="section-label">Hot topics</div>
      <div class="hot-topics-grid">
        ${topPairs.map(([pairKey, articles]) => {
          const [d1, d2] = pairKey.split('+');
          const label1 = DOMAIN_LABELS[d1] || d1;
          const label2 = DOMAIN_LABELS[d2] || d2;
          const color1 = DOMAIN_COLORS[d1] || '#666';
          const color2 = DOMAIN_COLORS[d2] || '#666';
          const gradient = DOMAIN_GRADIENTS[d1] || 'var(--surface)';

          const shown = articles.slice(0, 3);
          const articlesHtml = shown.map(a =>
            `<div class="hot-topic-article">
              <a href="${a.url}" target="_blank" rel="noopener">
                <div class="hot-topic-article-title">${escHtml(a.title)}</div>
                <div class="hot-topic-article-meta">${escHtml(a.source)} · ${a.date}</div>
              </a>
            </div>`
          ).join('');

          return `<div class="hot-topic-card" style="background:${gradient};border-color:${color1}30">
            <div class="hot-topic-pair">
              <span style="color:${color1}">${label1}</span>
              <span class="pair-connector">×</span>
              <span style="color:${color2}">${label2}</span>
            </div>
            <div class="hot-topic-count">${articles.length} overlapping articles</div>
            <div class="hot-topic-articles">${articlesHtml}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
  container.innerHTML = html;
}

function renderRadar() {
  const container = document.getElementById('radarContainer');
  const base = getBaseFiltered();

  // Top 5 sources by volume
  const sourceCounts = {};
  for (const a of base) { sourceCounts[a.source] = (sourceCounts[a.source] || 0) + 1; }
  const topSources = Object.keys(sourceCounts)
    .sort((a, b) => sourceCounts[b] - sourceCounts[a])
    .slice(0, 5);

  // Cross-domain from non-mainstream tiers, excluding junk
  const radar = base.filter(a =>
    a.cross_domain &&
    !topSources.includes(a.source) &&
    ['lived', 'analysis', 'explainer', 'domain'].includes(a.tier) &&
    !isJunkArticle(a)
  );

  if (radar.length === 0) { container.innerHTML = ''; return; }

  const shown = radar.slice(0, 6);
  const html = `
    <div class="radar-section">
      <div class="section-label">Under the radar</div>
      <div class="radar-grid">
        ${shown.map(a => {
          const tags = (a.domains || []).filter(d => DOMAIN_LABELS[d]).map(d =>
            `<span class="radar-domain-tag" style="background:${DOMAIN_COLORS[d]}">${DOMAIN_LABELS[d]}</span>`
          ).join('');

          const summary = cleanSummary(a.summary);
          const trimmed = summary.length > 180 ? summary.substring(0, 180) + '...' : summary;

          return `<a class="radar-card" href="${a.url}" target="_blank" rel="noopener">
            <div class="radar-card-tags">${tags}</div>
            <div class="radar-card-title">${escHtml(a.title)}</div>
            ${trimmed ? `<div class="radar-card-summary">${escHtml(trimmed)}</div>` : ''}
            <div class="radar-card-meta">
              <span class="radar-card-source">${escHtml(a.source)}</span>
              <span>${a.date}</span>
            </div>
          </a>`;
        }).join('')}
      </div>
    </div>
  `;
  container.innerHTML = html;
}

function renderClusters() {
  const grid = document.getElementById('clusterGrid');
  const base = getBaseFiltered();
  const cross = base.filter(a => a.cross_domain && a.domains && a.domains.length >= 2);

  const pairs = {};
  for (const a of cross) {
    const domains = [...a.domains].sort();
    for (let i = 0; i < domains.length; i++) {
      for (let j = i + 1; j < domains.length; j++) {
        const key = domains[i] + '+' + domains[j];
        if (!pairs[key]) pairs[key] = [];
        pairs[key].push(a);
      }
    }
  }

  const topPairs = Object.entries(pairs)
    .sort((a, b) => b[1].length - a[1].length)
    .slice(0, 6);

  if (topPairs.length === 0) {
    grid.innerHTML = '<div class="empty-state">No cross-domain signals found.</div>';
    return;
  }

  grid.innerHTML = topPairs.map(([pairKey, articles]) => {
    const [d1, d2] = pairKey.split('+');
    const label1 = DOMAIN_LABELS[d1] || d1;
    const label2 = DOMAIN_LABELS[d2] || d2;
    const color1 = DOMAIN_COLORS[d1] || '#666';
    const color2 = DOMAIN_COLORS[d2] || '#666';

    const shown = articles.slice(0, 4);
    const articleHtml = shown.map(a =>
      `<a class="cluster-article" href="${a.url}" target="_blank" rel="noopener">
        <div class="cluster-article-title">${escHtml(a.title)}</div>
        <div class="cluster-article-meta">${escHtml(a.source)} &middot; ${a.date}</div>
      </a>`
    ).join('');

    return `<div class="cluster-card">
      <div class="cluster-header">
        <span class="cluster-dot" style="background:${color1}"></span>
        <span class="cluster-dot" style="background:${color2}"></span>
        <span class="cluster-label">${label1} + ${label2}</span>
        <span class="cluster-count">${articles.length}</span>
      </div>
      <div class="cluster-articles">${articleHtml}</div>
    </div>`;
  }).join('');
}

function renderArticles() {
  const list = document.getElementById('articleList');
  const filtered = getFiltered();
  const showing = filtered.slice(0, displayCount);

  document.getElementById('articlesCount').textContent = `${filtered.length} articles`;

  if (showing.length === 0) {
    list.innerHTML = '<div class="empty-state">No articles match this filter.</div>';
    document.getElementById('loadMore').style.display = 'none';
    return;
  }

  list.innerHTML = showing.map(a => articleCard(a)).join('');

  const loadMore = document.getElementById('loadMore');
  if (filtered.length > displayCount) {
    loadMore.style.display = 'block';
    loadMore.textContent = `Show more (${filtered.length - displayCount} remaining)`;
    loadMore.onclick = () => { displayCount += 50; renderArticles(); };
  } else {
    loadMore.style.display = 'none';
  }
}

function articleCard(a) {
  const tags = (a.domains || []).filter(d => DOMAIN_LABELS[d]).map(d =>
    `<span class="domain-tag" style="background:${DOMAIN_COLORS[d]}">${DOMAIN_LABELS[d]}</span>`
  ).join('');

  return `<a class="article-card" href="${a.url}" target="_blank" rel="noopener">
    <div>
      <div class="article-title">${escHtml(a.title)}</div>
      <div class="article-meta">
        <span class="article-source">${escHtml(a.source)}</span>
        <span>${a.date}</span>
      </div>
    </div>
    <div class="domain-tags">${tags}</div>
  </a>`;
}

function renderFaq() {
  const container = document.getElementById('faqSection');
  const faqs = [
    {
      q: 'What is Signal Board?',
      a: 'A research tool that monitors 59 sources across 10 structural domains and surfaces the connections between them that single-beat reporting typically misses.'
    },
    {
      q: 'How does it work?',
      a: 'Each day, Signal Board pulls from RSS feeds spanning national news, international coverage, domain-specific outlets, explainer journalism, lived experience reporting, and policy analysis. Articles are auto-tagged across 10 domains. Those touching multiple domains are flagged as cross-domain signals.'
    },
    {
      q: 'What are cross-domain signals?',
      a: 'Most news is organized by beat. But the forces reshaping the world don\'t stay in lanes. When a story about federal workers (Labor) connects to an executive order (Legal, Governance) that also affects military readiness (Security), that convergence is a signal. This tool surfaces those overlaps.'
    },
    {
      q: 'Can I use this data?',
      a: 'Signal Board is a personal research project. The data comes from publicly available RSS feeds. If you\'re interested in the methodology, reach out via the link below.'
    }
  ];

  container.innerHTML = `
    <div class="section-label">FAQ</div>
    ${faqs.map((item, idx) => `
      <div class="faq-item">
        <div class="faq-question" onclick="toggleFaq(${idx})">
          <div class="faq-question-text">${escHtml(item.q)}</div>
          <div class="faq-toggle" id="toggle-${idx}">+</div>
        </div>
        <div class="faq-answer" id="answer-${idx}">${escHtml(item.a)}</div>
      </div>
    `).join('')}
  `;
}

function toggleFaq(idx) {
  const answer = document.getElementById(`answer-${idx}`);
  const toggle = document.getElementById(`toggle-${idx}`);
  answer.classList.toggle('open');
  toggle.classList.toggle('open');
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

init();
</script>
</body>
</html>
