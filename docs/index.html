<script>

  geopolitics: '#1976D2', domestic_politics: '#7B1FA2', legal: '#FF9800',
};
// Lightened versions for backgrounds/surfaces
const DL_BG = {};
for (const [k,c] of Object.entries(DC)) {
  const r = parseInt(c.slice(1,3),16), g = parseInt(c.slice(3,5),16), b = parseInt(c.slice(5,7),16);
  DL_BG[k] = `rgba(${r},${g},${b},0.08)`;
}

const DL = {
  ai: 'AI', labor: 'Labor', governance: 'Governance', information: 'Information',
  economics: 'Economics', climate: 'Climate', security: 'Security',
  geopolitics: 'Geopolitics', domestic_politics: 'Politics', legal: 'Legal',
};
const DD = {
  ai: 'Artificial intelligence and automation. Anything where machines are doing what people used to do, or being asked to think.',
  labor: 'Jobs, workers, pay, and working conditions. What it takes to make a living and who decides the terms.',
  governance: 'Government agencies, executive actions, and public services. The machinery that runs a country, day to day.',
  information: 'Media, data, tech platforms, and how information spreads. Who controls what you see and how you see it.',
  economics: 'Markets, prices, trade, and the economy. The forces that determine what things cost and who can afford them.',
  climate: 'Environment, energy, and the effects of climate change. The planet\'s systems and how they\'re shifting.',
  security: 'Military, defense, policing, and threats to safety. What countries and communities do to protect themselves.',
  geopolitics: 'Relationships and tensions between countries. The alliances, rivalries, and power moves that shape the world.',
  domestic_politics: 'U.S. political parties, elections, and policy fights. The battles over who has power and what they do with it.',
  legal: 'Courts, laws, enforcement, and legal rights. The rules of the game and who gets to change them.',
};

const PAIR_EXPLAIN = {
  'governance+legal': 'Government actions running into the courts. Laws being written, challenged, or struck down.',
  'geopolitics+security': 'Tensions between countries that affect military action and safety around the world.',
  'domestic_politics+security': 'Political decisions that directly affect defense, policing, or public safety.',
  'economics+security': 'When conflict and military spending hit markets, prices, and people\'s wallets.',
  'climate+security': 'How environmental change and resource scarcity create security threats.',

  'ai+governance': 'How governments are trying to regulate AI, and what that means for everyone.',
  'ai+economics': 'AI\'s effect on markets, investment, and who profits from the next wave of technology.',
  'ai+information': 'How AI is changing what information people see, trust, and share.',

  'governance+economics': 'Government spending, regulation, and economic policy shaping everyday costs.',
  'governance+information': 'How government controls or shapes what information the public gets.',
  'governance+climate': 'Government environmental policy, agency actions, and climate regulation.',
  'governance+labor': 'Government policy on workers\' rights, benefits, pay, and workplace rules.',
  'governance+geopolitics': 'Foreign policy decisions made by government agencies and their global impact.',
  'domestic_politics+legal': 'Political battles playing out in the courts or through new laws.',
  'domestic_politics+economics': 'How political decisions directly affect the economy, jobs, and prices.',
  'domestic_politics+governance': 'Political battles over how government agencies are run and what they do.',
  'domestic_politics+information': 'How politics shapes media coverage and what information people trust.',
  'economics+legal': 'Business regulation, antitrust, trade law, and how the legal system shapes markets.',
  'economics+labor': 'How economic conditions affect wages, jobs, and whether people can afford to live.',
  'economics+geopolitics': 'How international relationships affect trade, prices, and the global economy.',
  'economics+information': 'How tech platforms, data, and media shape markets and economic decisions.',
  'information+security': 'Surveillance, data privacy, hacking, and digital threats to safety.',
  'information+legal': 'Tech regulation, free speech law, and who controls what you see online.',
  'information+domestic_politics': 'How media, social platforms, and misinformation shape political outcomes.',
  'labor+legal': 'Workers\' rights, pay disputes, unions, and employment law.',
  'labor+economics': 'How economic conditions affect wages, jobs, and whether people can afford to live.',
  'labor+security': 'Workers in defense, law enforcement, and how labor disputes affect safety.',
  'labor+domestic_politics': 'Political battles over workers\' rights, minimum wage, and labor protections.',
  'climate+geopolitics': 'How climate change and energy competition shape relationships between countries.',
  'climate+legal': 'Environmental lawsuits, pollution regulations, and climate-related court battles.',
  'climate+information': 'How climate science is communicated, denied, or distorted in media.',
  'climate+labor': 'How environmental shifts affect jobs in energy, agriculture, and industry.',
  'legal+security': 'Law enforcement, civil rights, surveillance law, and the justice system.',
  'legal+geopolitics': 'International law, war crimes, treaties, and cross-border legal disputes.',
  'geopolitics+domestic_politics': 'How foreign policy and international tensions play out in U.S. politics.',
  'geopolitics+economics': 'How international relationships affect trade, prices, and the global economy.',
  'geopolitics+information': 'Propaganda, foreign influence, and how countries fight through information.',
  'security+legal': 'Law enforcement, civil rights, surveillance law, and the justice system.',
};

const DG = {};
for (const [k,c] of Object.entries(DC)) {
  const r = parseInt(c.slice(1,3),16), g = parseInt(c.slice(3,5),16), b = parseInt(c.slice(5,7),16);
  DG[k] = `linear-gradient(135deg, rgba(${r},${g},${b},0.18) 0%, rgba(${r},${g},${b},0.04) 100%)`;
}

const JUNK = [
  /\bsmart lock\b/i, /\bsmart home\b/i, /\bproduct review\b/i,
  /\bbest .{0,20}(buy|deal|price|sale)\b/i, /\bcoupon\b/i, /\bdiscount code\b/i,
  /\bgadget\b/i, /\bunboxing\b/i, /\bhoroscope\b/i, /\brecipe\b/i,
];

let articles = [], stats = {}, filter = 'all', showing = 50;

async function init() {
  try {
    const cb = '?v=' + Date.now();
    let r;
    try { r = await fetch('./data/articles.json' + cb); if(!r.ok) throw 0; }
    catch { r = await fetch('../data/articles.json' + cb); }
    const d = await r.json();
    articles = d.articles || [];
    stats = d.stats || {};

    document.getElementById('statsRow').innerHTML = `
      <div class="stat-block">
        <div class="stat-num">${stats.total_articles||0}</div>
        <div class="stat-label">Stories today</div>
      </div>
      <div class="stat-block">
        <div class="stat-num">${stats.cross_domain_count||0}</div>
        <div class="stat-label">Connections</div>
      </div>
      <div class="stat-block">
        <div class="stat-num">${stats.source_count||59}</div>
        <div class="stat-label">Sources</div>
      </div>
      <div class="stat-block">
        <div class="stat-num">10</div>
        <div class="stat-label">Topics</div>
      </div>
    `;
    render();
  } catch(e) {
    document.getElementById('feedList').innerHTML = '<div class="empty-state">Loading...</div>';
    console.error(e);
  }
}

function render() {
  renderTrack();
  renderChips();
  renderCollisions();
  renderRadar();
  renderFeed();
  renderFaq();
}

function renderTrack() {
  const bar = document.getElementById('trackBar');
  const counts = {};
  for (const a of articles) for (const d of (a.domains||[])) counts[d] = (counts[d]||0) + 1;
  const total = Object.values(counts).reduce((s,c) => s+c, 0);
  if (!total) { bar.innerHTML = ''; return; }

  bar.innerHTML = Object.entries(counts)
    .sort((a,b) => b[1]-a[1])
    .map(([k,c]) => {
      const pct = Math.max((c/total)*100, 3);
      const desc = DD[k]?.split('.')[0] || '';
      return `<div class="track-seg" style="width:${pct}%;background:${DC[k]||'#666'}"
                   onclick="setFilter('${k}')">
        <div class="tip"><strong>${DL[k]||k}</strong> &middot; ${c} stories<span class="tip-desc">${desc}</span></div>
      </div>`;
    }).join('');
}

function renderChips() {
  const el = document.getElementById('chipBar');
  let html = `<button class="chip ${filter==='all'?'active':''}" onclick="setFilter('all')"
    style="${filter==='all'?'background:var(--purple);border-color:var(--purple)':''}">All stories</button>`;

  html += `<button class="chip ${filter==='cross'?'active':''}" onclick="setFilter('cross')"
    style="${filter==='cross'?'background:#fff;border-color:#fff;color:#000':''}">Connected</button>`;

  for (const [k,l] of Object.entries(DL)) {
    const on = filter === k;
    html += `<button class="chip ${on?'active':''}" onclick="setFilter('${k}')"
      style="${on?`background:${DC[k]};border-color:${DC[k]};color:rgba(0,0,0,0.9)`:''}">
      <span class="chip-dot" style="background:${DC[k]}"></span>${l}
    </button>`;
  }
  el.innerHTML = html;
}

function setFilter(f) {
  filter = f; showing = 50;
  renderChips();
  renderFeed();
  document.getElementById('collisionContainer').style.display = (f==='all'||f==='cross') ? 'block' : 'none';
  document.getElementById('radarContainer').style.display = (f==='all') ? 'block' : 'none';
}

function getFiltered() {
  if (filter === 'cross') return articles.filter(a => a.cross_domain);
  if (filter !== 'all') return articles.filter(a => a.domains && a.domains.includes(filter));
  return articles;
}

function isJunk(a) {
  const t = (a.title + ' ' + (a.summary||'')).toLowerCase();
  return JUNK.some(p => p.test(t));
}

function cleanText(s) {
  if (!s) return '';
  const ta = document.createElement('textarea');
  ta.innerHTML = s;
  let t = ta.value;
  t = t.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
  return t;
}

function getPairExplain(d1, d2) {
  const k1 = d1 + '+' + d2;
  const k2 = d2 + '+' + d1;
  return PAIR_EXPLAIN[k1] || PAIR_EXPLAIN[k2] || `Stories where ${DL[d1]||d1} and ${DL[d2]||d2} overlap.`;
}

function renderCollisions() {
  const el = document.getElementById('collisionContainer');
  const pairs = {};
  for (const a of articles) {
    if (a.cross_domain && a.domains && a.domains.length >= 2) {
      const ds = [...a.domains].sort();
      for (let i=0;i<ds.length;i++) for (let j=i+1;j<ds.length;j++) {
        const k = ds[i]+'+'+ds[j];
        if(!pairs[k]) pairs[k]=[];
        pairs[k].push(a);
      }
    }
  }

  const top = Object.entries(pairs).sort((a,b)=>b[1].length-a[1].length).slice(0,6);
  if (!top.length) { el.innerHTML = ''; return; }

  el.innerHTML = `
    <div class="section">
      <div class="section-head">
        <div class="section-title">Where topics are colliding right now</div>
        <div class="section-sub">When a story lives in two worlds at once, that overlap is usually where the most important thing is happening. These are today's biggest collisions.</div>
      </div>
      <div class="collision-grid">
        ${top.map(([pk,arts]) => {
          const [d1,d2] = pk.split('+');
          const l1=DL[d1]||d1, l2=DL[d2]||d2;
          const c1=DC[d1]||'#666', c2=DC[d2]||'#666';
          const explain = getPairExplain(d1,d2);
          const shown = arts.slice(0,3);
          return `<div class="collision-card" style="background:${DG[d1]};border:1px solid ${c1}18;--card-accent:${c1}">
            <div class="collision-pair">
              <span class="domain-name" style="color:${c1}">${l1}</span>
              <span class="x">+</span>
              <span class="domain-name" style="color:${c2}">${l2}</span>
              <span class="story-count">${arts.length}</span>
            </div>
            <div class="collision-explain">${explain}</div>
            <div class="collision-articles">
              ${shown.map(a => `<a class="collision-article" href="${a.url}" target="_blank" rel="noopener">
                <div class="collision-article-title">${esc(a.title)}</div>
                ${a.connection ? `<div class="collision-article-why">${esc(a.connection)}</div>` : ''}
                <div class="collision-article-meta">${esc(a.source)}</div>
              </a>`).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

function getWhyItMatters(a) {
  const ds = (a.domains||[]).filter(d=>DL[d]);
  if (ds.length < 2) return '';
  const labels = ds.map(d=>DL[d]);
  return `Touches ${labels.join(', ')} at once`;
}

function renderRadar() {
  const el = document.getElementById('radarContainer');
  const srcCounts = {};
  for (const a of articles) srcCounts[a.source] = (srcCounts[a.source]||0)+1;
  const topSrc = Object.keys(srcCounts).sort((a,b)=>srcCounts[b]-srcCounts[a]).slice(0,5);

  const radar = articles.filter(a =>
    a.cross_domain &&
    !topSrc.includes(a.source) &&
    ['lived','analysis','explainer','domain'].includes(a.tier) &&
    !isJunk(a)
  );

  if (!radar.length) { el.innerHTML = ''; return; }

  const shown = radar.slice(0,4);
  el.innerHTML = `
    <div class="section">
      <div class="section-head">
        <div class="section-title">Stories you probably haven't seen</div>
        <div class="section-sub">Important stories from smaller outlets that connect multiple topics. These don't get the same attention, but they're worth knowing about.</div>
      </div>
      <div class="radar-grid">
        ${shown.map(a => {
          const ds = (a.domains||[]).filter(d=>DL[d]);
          const tags = ds.map(d =>
            `<span class="radar-tag" style="background:${DC[d]}">${DL[d]}</span>`
          ).join('');
          const c1 = ds[0] ? DC[ds[0]] : 'transparent';
          const c2 = ds[1] ? DC[ds[1]] : c1;
          const summary = cleanText(a.summary);
          const trimmed = summary.length > 140 ? summary.substring(0,140)+'...' : summary;
          const why = a.connection || getWhyItMatters(a);
          return `<a class="radar-card" href="${a.url}" target="_blank" rel="noopener"
                    style="--card-c1:${c1};--card-c2:${c2}">
            <div class="radar-tags">${tags}</div>
            <div class="radar-title">${esc(a.title)}</div>
            ${why ? `<div class="radar-why">${esc(why)}</div>` : ''}
            ${trimmed ? `<div class="radar-summary">${esc(trimmed)}</div>` : ''}
            <div class="radar-meta"><span class="radar-source">${esc(a.source)}</span> · ${a.date}</div>
          </a>`;
        }).join('')}
      </div>
    </div>
  `;
}

function renderFeed() {
  const list = document.getElementById('feedList');
  const filtered = getFiltered();
  const slice = filtered.slice(0, showing);

  document.getElementById('feedCount').textContent = `${filtered.length} stories`;

  if (!slice.length) {
    list.innerHTML = '<div class="empty-state">No stories match this filter.</div>';
    document.getElementById('loadMore').style.display = 'none';
    return;
  }

  list.innerHTML = slice.map(a => {
    const tags = (a.domains||[]).filter(d=>DL[d]).map(d =>
      `<span class="feed-tag" style="background:${DC[d]}">${DL[d]}</span>`
    ).join('');
    return `<a class="feed-item" href="${a.url}" target="_blank" rel="noopener">
      <div>
        <div class="feed-title">${esc(a.title)}</div>
        <div class="feed-meta"><span class="feed-source">${esc(a.source)}</span><span>${a.date}</span></div>
      </div>
      <div class="feed-tags">${tags}</div>
    </a>`;
  }).join('');

  const btn = document.getElementById('loadMore');
  if (filtered.length > showing) {
    btn.style.display = 'block';
    btn.textContent = `Show more (${filtered.length - showing} remaining)`;
    btn.onclick = () => { showing += 50; renderFeed(); };
  } else { btn.style.display = 'none'; }
}

function renderFaq() {
  const el = document.getElementById('faqSection');
  const qs = [
    {
      q: 'What is this?',
      a: 'Signal Board reads 59 news sources every day and sorts each story by topic: AI, jobs, government, the economy, climate, security, and more. When a story touches more than one topic at the same time, this tool flags it. Those overlaps are usually where the most important things are happening, and they\'re exactly what normal news coverage tends to miss.'
    },
    {
      q: 'Why should I care about "connected" stories?',
      a: 'Most news covers one thing at a time. A jobs reporter writes about jobs. A climate reporter writes about climate. But in real life, these things affect each other constantly. When gas prices go up because of a war overseas, that\'s economics and security and geopolitics all at once. When an AI company lays people off, that\'s technology and labor and the economy colliding. Seeing those connections helps you understand what\'s actually going on, not just what one reporter is covering.'
    },
    {
      q: 'What do the colors mean?',
      a: 'Each color represents a topic. Purple is AI. Orange is Labor (jobs and workers). Pink is Governance (government actions). Teal is Economics. Green is Climate. Red is Security. Blue is Geopolitics (how countries relate to each other). And so on. When you see multiple colors on one story, it means that story sits at the intersection of those worlds. Hover over any topic name on the board to see a full description.'
    },
    {
      q: 'Who built this?',
      a: 'Elise Hasseltine. Signal Board is a personal research tool, built to make the work of understanding what\'s happening in the world a little more legible. It reads from real news sources, tags patterns automatically, and puts the connections front and center. No editorial picks, no algorithm trying to keep you scrolling. Just the signal.'
    }
  ];

  el.innerHTML = `
    <div class="section-title" style="margin-bottom:0.8rem">Questions</div>
    ${qs.map((item,i) => `
      <div class="faq-item">
        <button class="faq-q" onclick="toggleFaq(${i})">
          <span class="faq-q-text">${esc(item.q)}</span>
          <span class="faq-toggle" id="tog-${i}">+</span>
        </button>
        <div class="faq-a" id="ans-${i}">${esc(item.a)}</div>
      </div>
    `).join('')}
  `;
}

function toggleFaq(i) {
  document.getElementById(`ans-${i}`).classList.toggle('open');
  document.getElementById(`tog-${i}`).classList.toggle('open');
}

function fmtDate(iso) {
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s||'';
  return d.innerHTML;
}

init();
</script>
</body>
</html>
