<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Every article from Signal Board, filterable by domain. Browse all 2000+ stories across AI, Labor, Governance, Economics, Climate, and more.">
<meta property="og:title" content="All Stories - Signal Board">
<meta property="og:description" content="Every article from Signal Board, filterable by domain. Browse all 2000+ stories across AI, Labor, Governance, Economics, Climate, and more.">
<meta property="og:type" content="website">
<title>All Stories - Signal Board</title>
<link rel="canonical" href="https://www.elisehasseltine.com/signal-board/stories/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#e8e8e8;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  a{color:inherit;text-decoration:none;}

  /* Decorative shapes */
  .shapes{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.08;}

  .wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 1.5rem;}

  /* SITE NAV */
  .site-nav{display:flex;align-items:center;justify-content:space-between;padding:1.5rem 0;margin-bottom:1rem;border-bottom:1px solid rgba(255,255,255,0.06);}
  .nav-logo{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:800;color:#fff;letter-spacing:-0.03em;}
  .nav-links{display:flex;gap:1.5rem;align-items:center;}
  .nav-links a{font-size:0.85rem;color:rgba(235,230,245,0.5);font-weight:500;transition:color 0.15s;}
  .nav-links a:hover{color:#fff;}
  .nav-links a.active{color:#fff;font-weight:700;}

  /* HERO */
  .hero{padding:2rem 0 3rem;}
  .hero h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(2.8rem,7vw,4.5rem);font-weight:800;letter-spacing:-0.06em;color:#fff;line-height:1.05;margin-bottom:1.5rem;}
  .hero .intro{font-size:clamp(0.95rem,2vw,1.1rem);color:rgba(235,230,245,0.65);line-height:1.8;max-width:650px;}

  /* FILTER SECTION */
  .filters-section{margin:3rem 0 2.5rem;}
  .filters-label{font-family:'Space Grotesk',sans-serif;font-size:0.85rem;font-weight:700;color:rgba(235,230,245,0.5);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:1rem;display:block;}

  .filter-pills{display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1.5rem;}
  .filter-pill{display:inline-flex;align-items:center;gap:0.5rem;padding:1rem 1.6rem;border-radius:100px;font-family:'Space Grotesk',sans-serif;font-size:clamp(0.8rem,1.8vw,0.95rem);font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.4);background:#e0e0e0;border:2px solid transparent;cursor:pointer;transition:all 0.2s;min-height:48px;white-space:nowrap;}
  .filter-pill:hover{transform:scale(1.05);}
  .filter-pill.active{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,0.2);}
  .filter-pill .count{opacity:0.6;font-weight:500;font-size:0.85em;}

  /* ARTICLE LIST */
  .stats-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding:0.75rem 0;border-bottom:1px solid rgba(255,255,255,0.1);}
  .stats-bar .count{font-family:'Space Grotesk',sans-serif;font-size:0.95rem;font-weight:600;color:rgba(235,230,245,0.8);}
  .stats-bar .count .num{font-weight:800;color:#fff;}

  .articles-container{display:flex;flex-direction:column;gap:0;}
  .article-item{padding:1.5rem;border-bottom:1px solid rgba(255,255,255,0.08);transition:background 0.15s;}
  .article-item:hover{background:rgba(255,255,255,0.03);}
  .article-item:last-child{border-bottom:none;}

  .article-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(1rem,2vw,1.25rem);font-weight:700;color:#fff;line-height:1.3;margin-bottom:0.6rem;display:block;transition:color 0.2s;cursor:pointer;}
  .article-title:hover{color:#6652FF;}

  .article-meta{display:flex;align-items:center;gap:1rem;margin-bottom:0.7rem;flex-wrap:wrap;font-size:0.85rem;}
  .article-source{font-weight:600;color:rgba(235,230,245,0.85);}
  .article-date{color:rgba(235,230,245,0.5);font-size:0.8rem;}

  .article-tags{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.5rem;}
  .tag{display:inline-flex;align-items:center;padding:0.35rem 0.8rem;border-radius:100px;font-size:0.72rem;font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.3);}
  .tag.cross-domain{border:1px solid rgba(235,230,245,0.3);background:rgba(255,255,255,0.05);color:rgba(235,230,245,0.7);}

  .article-summary{font-size:0.9rem;color:rgba(235,230,245,0.6);line-height:1.6;margin-bottom:0.5rem;}

  /* PAGINATION */
  .load-more-btn{width:100%;padding:1.2rem 1.5rem;margin-top:2rem;margin-bottom:3rem;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:16px;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
  .load-more-btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.25);}
  .load-more-btn:disabled{opacity:0.5;cursor:not-allowed;}

  /* EMPTY STATE */
  .empty-state{text-align:center;padding:3rem 1.5rem;color:rgba(235,230,245,0.5);}
  .empty-state p{font-size:1rem;line-height:1.6;}

  /* FOOTER */
  .footer{border-top:1px solid rgba(255,255,255,0.06);padding:2rem 0 3rem;font-size:0.72rem;color:rgba(235,230,245,0.3);display:flex;gap:1.5rem;flex-wrap:wrap;}

  @media(max-width:700px){
    .wrap{padding:0 1rem;}
    .hero{padding:1.5rem 0 2rem;}
    .site-nav{flex-direction:column;gap:0.8rem;align-items:flex-start;}
    .nav-links{gap:1rem;flex-wrap:wrap;}
    .filter-pill{padding:0.85rem 1.2rem;min-height:44px;font-size:0.8rem;}
    .article-item{padding:1rem;}
    .article-title{font-size:1rem;}
    .article-meta{gap:0.75rem;}
    .article-tags{gap:0.3rem;}
    .tag{padding:0.3rem 0.6rem;font-size:0.65rem;}
  }
</style>
</head>
<body>

<!-- Decorative shapes -->
<svg class="shapes" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <circle cx="120" cy="80" r="60" fill="#6652FF"/>
  <circle cx="1300" cy="150" r="90" fill="#FF5400"/>
  <rect x="200" y="700" width="80" height="80" rx="15" fill="#00C2A8" transform="rotate(15,240,740)"/>
  <circle cx="1100" cy="800" r="70" fill="#FF0054"/>
  <rect x="600" y="50" width="60" height="120" rx="12" fill="#4CAF50" transform="rotate(-20,630,110)"/>
  <circle cx="80" cy="500" r="40" fill="#FF9800"/>
  <rect x="1200" cy="450" width="100" height="50" rx="25" fill="#9E0059"/>
  <circle cx="700" cy="850" r="50" fill="#1976D2"/>
  <rect x="900" y="100" width="70" height="70" rx="35" fill="#7B1FA2"/>
  <circle cx="400" cy="300" r="35" fill="#D32F2F"/>
</svg>

<div class="wrap">

<nav class="site-nav">
  <a href="../" class="nav-logo">Signal Board</a>
  <div class="nav-links">
    <a href="../today/">Today</a>
    <a href="./" class="active">Stories</a>
    <a href="../sources/">Sources</a>
    <a href="../how-it-works/">How It Works</a>
    <a href="../transparency/">Transparency</a>
  </div>
</nav>

<div class="hero">
  <h1>All Stories</h1>
  <p class="intro">Every article from every source, tagged by topic. Filter to find what connects.</p>
</div>

<div class="filters-section">
  <label class="filters-label">Filter by domain</label>
  <div class="filter-pills" id="filters"></div>
</div>

<div class="stats-bar">
  <span class="count">Showing <span class="num" id="count-filtered">0</span> of <span class="num" id="count-total">0</span> stories</span>
</div>

<div class="articles-container" id="articles"></div>

<button class="load-more-btn" id="loadMoreBtn" style="display:none;">Show more</button>

<div class="footer">
  <span>Signal Board</span>
  <span>Updated daily</span>
  <span><a href="../sources/">All sources</a></span>
</div>

</div>

<script>
const DC={ai:'#6652FF',labor:'#FF5400',governance:'#FF0054',information:'#9E0059',economics:'#00C2A8',climate:'#4CAF50',security:'#D32F2F',geopolitics:'#1976D2',domestic_politics:'#7B1FA2',legal:'#FF9800'};
const DL={ai:'AI',labor:'Labor',governance:'Governance',information:'Information',economics:'Economics',climate:'Climate',security:'Security',geopolitics:'Geopolitics',domestic_politics:'Politics',legal:'Legal'};

let allArticles=[];
let filteredArticles=[];
let activeFilter='all';
let displayCount=0;
const perPage=50;

function formatDate(dateStr){
  const d=new Date(dateStr+'T00:00:00Z');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function renderFilters(){
  const container=document.getElementById('filters');
  const counts={};
  for(const a of allArticles){
    for(const dom of(a.domains||[])){ counts[dom]=(counts[dom]||0)+1; }
  }

  let html='<button class="filter-pill active" data-filter="all" style="background:#6652FF;color:#fff;">All Stories <span class="count">'+allArticles.length+'</span></button>';

  const crossCount=allArticles.filter(a=>a.cross_domain).length;
  html+='<button class="filter-pill" data-filter="cross-domain" style="background:#FF5400;color:#fff;">Cross-domain <span class="count">'+crossCount+'</span></button>';

  for(const [key,label] of Object.entries(DL)){
    const c=counts[key]||0;
    if(c>0){
      html+='<button class="filter-pill" data-filter="'+key+'" style="background:'+DC[key]+';color:rgba(0,0,0,0.88);">'+label+' <span class="count">'+c+'</span></button>';
    }
  }

  container.innerHTML=html;

  container.querySelectorAll('.filter-pill').forEach(btn=>{
    btn.addEventListener('click',function(){
      activeFilter=this.getAttribute('data-filter');
      filterArticles();
      updateFilters();
    });
  });
}

function updateFilters(){
  document.querySelectorAll('.filter-pill').forEach(btn=>{
    if(btn.getAttribute('data-filter')===activeFilter){
      btn.classList.add('active');
    }else{
      btn.classList.remove('active');
    }
  });
}

function filterArticles(){
  if(activeFilter==='all'){
    filteredArticles=allArticles;
  }else if(activeFilter==='cross-domain'){
    filteredArticles=allArticles.filter(a=>a.cross_domain);
  }else{
    filteredArticles=allArticles.filter(a=>(a.domains||[]).includes(activeFilter));
  }
  filteredArticles.sort((a,b)=>new Date(b.date)-new Date(a.date));
  displayCount=0;
  renderArticles();
}

function renderArticles(){
  const container=document.getElementById('articles');
  const start=displayCount;
  const end=Math.min(displayCount+perPage,filteredArticles.length);

  let html='';
  for(let i=start;i<end;i++){
    const a=filteredArticles[i];
    const domains=a.domains||[];
    const crossBadge=a.cross_domain?'<span class="tag cross-domain">Cross-domain</span>':'';
    const tagHtml=domains.map(d=>'<span class="tag" style="background:'+DC[d]+';color:rgba(0,0,0,0.88);">'+DL[d]+'</span>').join('');

    html+='<div class="article-item">';
    html+='<a href="'+a.url+'" target="_blank" rel="noopener" class="article-title">'+escapeHtml(a.title)+'</a>';
    html+='<div class="article-meta"><span class="article-source">'+escapeHtml(a.source)+'</span><span class="article-date">'+formatDate(a.date)+'</span></div>';
    html+='<div class="article-tags">'+tagHtml+crossBadge+'</div>';
    if(a.summary){
      html+='<div class="article-summary">'+escapeHtml(a.summary)+'</div>';
    }
    html+='</div>';
  }

  if(displayCount===0){
    container.innerHTML=html;
  }else{
    container.innerHTML+=html;
  }

  displayCount=end;
  document.getElementById('count-filtered').textContent=filteredArticles.length;
  document.getElementById('loadMoreBtn').style.display=displayCount<filteredArticles.length?'block':'none';
}

function escapeHtml(str){
  const div=document.createElement('div');
  div.textContent=str;
  return div.innerHTML;
}

document.getElementById('loadMoreBtn').addEventListener('click',renderArticles);

async function init(){
  try{
    const cb='?v='+Date.now();
    let r=await fetch('../data/articles.json'+cb);
    const d=await r.json();
    allArticles=d.articles||[];
    document.getElementById('count-total').textContent=allArticles.length;
    renderFilters();
    filterArticles();
  }catch(e){
    console.error(e);
    document.getElementById('articles').innerHTML='<div class="empty-state"><p>Unable to load articles. Please refresh the page.</p></div>';
  }
}

init();
</script>

</body>
</html>
