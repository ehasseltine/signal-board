name: Daily Pipeline

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser anthropic

      - name: Run ingest (Stage 1 — fetch RSS + AI classify)
        working-directory: actions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python ingest.py

      - name: Run daily analysis (Stage 2 — cluster + spectrum + cooperation)
        working-directory: actions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python analyze.py

      - name: Run editorial synthesis (Stage 3 — narrative + headline)
        working-directory: actions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python synthesize.py

      - name: Copy data to docs for GitHub Pages
        run: |
          mkdir -p docs/data/daily
          cp data/articles.json docs/data/articles.json
          cp -r data/daily/ docs/data/daily/ 2>/dev/null || true

      - name: Commit and push
        run: |
          git config user.name "Signal Board Bot"
          git config user.email "bot@signal-board"
          git add data/ docs/data/
          git diff --staged --quiet || git commit -m "daily: $(date -u +%Y-%m-%d)"
          git push
