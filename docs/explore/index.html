<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Explore the full Signal Board dataset: filter by domain, source tier, and cross-domain connections across 59 sources and 10 structural domains.">
<title>Explore — Signal Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #131316;
    --surface-hover: #1a1a1f;
    --border: #1f1f25;
    --text: #e8e8e8;
    --text-dim: rgba(235,230,245,0.45);
    --text-mid: rgba(235,230,245,0.75);
    --purple: #6652FF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── NAV ─── */
  .nav {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.75rem;
    transition: color 0.2s;
  }
  .nav a:hover { color: var(--text); }
  .nav .back { display: flex; align-items: center; gap: 0.3rem; }
  .nav .title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--text);
  }

  /* ─── MAIN ─── */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0.5rem 2rem 2rem;
  }

  .section-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-bottom: 0.8rem;
  }

  /* ─── HEAT BAR ─── */
  .heat-section { margin-bottom: 1.8rem; }
  .heat-bar {
    display: flex;
    height: 44px;
    border-radius: 8px;
    overflow: hidden;
    gap: 2px;
  }
  .heat-seg {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.68rem;
    font-weight: 700;
    color: rgba(0,0,0,0.75);
    cursor: pointer;
    transition: all 0.25s ease;
    min-width: 40px;
  }
  .heat-seg:hover { filter: brightness(1.15); transform: scaleY(1.06); }
  .heat-seg .seg-label {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 0.4rem;
  }

  /* ─── FILTERS ─── */
  .filter-row {
    display: flex;
    gap: 0.35rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }
  .filter-btn {
    padding: 0.35rem 0.8rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.35rem;
  }
  .filter-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
  .filter-btn.active { color: #fff; }
  .filter-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  .tier-btn {
    padding: 0.3rem 0.7rem;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 0.68rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tier-btn:hover { border-color: rgba(255,255,255,0.12); }
  .tier-btn.active { background: var(--surface); border-color: var(--text-dim); color: var(--text); }

  /* ─── STATS ROW ─── */
  .stats-row {
    display: flex;
    gap: 2rem;
    margin-bottom: 1.8rem;
    padding: 1rem 0;
    border-bottom: 1px solid var(--border);
  }
  .stat { text-align: center; }
  .stat-val {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
  }
  .stat-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }

  /* ─── CLUSTER GRID ─── */
  .cluster-section { margin-bottom: 2.5rem; }
  .cluster-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 0.7rem;
  }
  .cluster-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    transition: border-color 0.2s;
  }
  .cluster-card:hover { border-color: rgba(255,255,255,0.08); }
  .cluster-header {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.6rem;
  }
  .cluster-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cluster-label { font-size: 0.78rem; font-weight: 600; color: var(--text); }
  .cluster-count { font-size: 0.62rem; color: var(--text-dim); margin-left: auto; }
  .cluster-articles { display: flex; flex-direction: column; gap: 1px; }
  .cluster-article {
    display: block;
    text-decoration: none;
    color: var(--text);
    padding: 0.4rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: color 0.15s;
  }
  .cluster-article:last-child { border-bottom: none; }
  .cluster-article:hover { color: #fff; }
  .cluster-article-title { font-size: 0.78rem; line-height: 1.35; }
  .cluster-article-meta { font-size: 0.62rem; color: var(--text-dim); margin-top: 0.1rem; }

  /* ─── ARTICLE LIST ─── */
  .articles-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.6rem;
  }
  .articles-count { font-size: 0.65rem; color: var(--text-dim); }

  .article-list { display: flex; flex-direction: column; gap: 1px; }
  .article-card {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 1rem;
    align-items: center;
    padding: 0.65rem 0.8rem;
    background: var(--surface);
    border-radius: 4px;
    text-decoration: none;
    color: var(--text);
    transition: background 0.15s;
  }
  .article-card:hover { background: var(--surface-hover); }
  .article-title { font-size: 0.82rem; font-weight: 500; line-height: 1.35; }
  .article-meta {
    display: flex;
    gap: 0.4rem;
    align-items: center;
    margin-top: 0.15rem;
    font-size: 0.65rem;
    color: var(--text-dim);
  }
  .article-source { font-weight: 600; color: var(--text-mid); }
  .domain-tags {
    display: flex;
    gap: 0.2rem;
    flex-shrink: 0;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .domain-tag {
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    font-size: 0.55rem;
    font-weight: 700;
    color: rgba(0,0,0,0.85);
    white-space: nowrap;
  }

  .load-more {
    display: block;
    width: 100%;
    padding: 0.65rem;
    margin-top: 0.5rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .load-more:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }

  /* ─── FOOTER ─── */
  .footer {
    max-width: 1400px;
    margin: 2rem auto;
    padding: 1rem 2rem;
    border-top: 1px solid var(--border);
    font-size: 0.65rem;
    color: var(--text-dim);
    text-align: center;
  }
  .footer a { color: var(--purple); text-decoration: none; }

  .empty-state { text-align: center; padding: 2rem; color: var(--text-dim); font-size: 0.82rem; }

  @media (max-width: 768px) {
    .nav, .main, .footer { padding-left: 1rem; padding-right: 1rem; }
    .article-card { grid-template-columns: 1fr; }
    .domain-tags { margin-top: 0.3rem; justify-content: flex-start; }
    .cluster-grid { grid-template-columns: 1fr; }
    .stats-row { gap: 1rem; flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="nav">
  <a href="../" class="back">← Signal Board</a>
  <span class="title">Explore the data</span>
</div>

<div class="main">
  <div class="stats-row" id="statsRow"></div>

  <div class="heat-section">
    <div class="section-label" id="heatLabel">Domain activity</div>
    <div class="heat-bar" id="heatBar"></div>
  </div>

  <div class="filter-row" id="domainFilters"></div>
  <div class="filter-row" id="tierFilters"></div>

  <div class="cluster-section" id="clusterSection">
    <div class="section-label">Domain-pair clusters</div>
    <div class="cluster-grid" id="clusterGrid"></div>
  </div>

  <div>
    <div class="articles-header">
      <div class="section-label">All articles</div>
      <span class="articles-count" id="articlesCount"></span>
    </div>
    <div class="article-list" id="articleList"></div>
    <button class="load-more" id="loadMore" style="display:none">Show more</button>
  </div>
</div>

<div class="footer">
  <a href="../">Signal Board</a> · Built by <a href="https://www.elisehasseltine.com/">Elise Hasseltine</a> · 59 sources · 10 domains · Updated daily
</div>

<script>
const DC = {
  ai:'#6652FF', labor:'#FF5400', governance:'#FF0054', information:'#9E0059',
  economics:'#00C2A8', climate:'#4CAF50', security:'#D32F2F',
  geopolitics:'#1976D2', domestic_politics:'#7B1FA2', legal:'#FF9800',
};
const DL = {
  ai:'AI', labor:'Labor', governance:'Governance', information:'Information',
  economics:'Economics', climate:'Climate', security:'Security',
  geopolitics:'Geopolitics', domestic_politics:'Politics', legal:'Legal',
};

let articles=[], stats={}, domainFilter='all', tierFilter='all', showing=50;

async function init() {
  try {
    const cb='?v='+Date.now();
    let r;
    try { r = await fetch('../data/articles.json'+cb); if(!r.ok) throw 0; }
    catch { r = await fetch('../../data/articles.json'+cb); }
    const d = await r.json();
    articles = d.articles||[];
    stats = d.stats||{};

    document.getElementById('statsRow').innerHTML = `
      <div class="stat"><div class="stat-val">${stats.total_articles||0}</div><div class="stat-label">Articles</div></div>
      <div class="stat"><div class="stat-val">${stats.total_sources||0}</div><div class="stat-label">Sources</div></div>
      <div class="stat"><div class="stat-val">${stats.cross_domain_count||0}</div><div class="stat-label">Cross-domain</div></div>
      <div class="stat"><div class="stat-val">${Object.keys(DL).length}</div><div class="stat-label">Domains</div></div>
    `;

    renderAll();
  } catch(e) {
    document.getElementById('articleList').innerHTML = '<div class="empty-state">Loading data...</div>';
    console.error(e);
  }
}

function renderAll() {
  renderHeatBar();
  renderDomainFilters();
  renderTierFilters();
  renderClusters();
  renderArticles();
}

function renderHeatBar() {
  const bar = document.getElementById('heatBar');
  const filtered = getBaseFiltered();
  const counts = {};
  for (const a of filtered) for (const d of (a.domains||[])) counts[d]=(counts[d]||0)+1;
  const total = Object.values(counts).reduce((s,c)=>s+c,0);
  if(!total){bar.innerHTML='';return;}

  const tl = tierFilter==='all'?'':` — ${tierFilter}`;
  document.getElementById('heatLabel').textContent = `Domain activity${tl}`;

  bar.innerHTML = Object.entries(counts)
    .sort((a,b)=>b[1]-a[1])
    .map(([k,c])=>{
      const pct = Math.max((c/total)*100,3.5);
      return `<div class="heat-seg" style="width:${pct}%;background:${DC[k]||'#666'}"
                   onclick="setDomain('${k}')" title="${DL[k]||k}: ${c}">
        <span class="seg-label">${DL[k]||k} ${c}</span>
      </div>`;
    }).join('');
}

function getBaseFiltered() {
  let a = articles;
  if(tierFilter!=='all') a = a.filter(x=>x.tier===tierFilter);
  return a;
}

function getFiltered() {
  let a = getBaseFiltered();
  if(domainFilter==='cross') a = a.filter(x=>x.cross_domain);
  else if(domainFilter!=='all') a = a.filter(x=>x.domains&&x.domains.includes(domainFilter));
  return a;
}

function renderDomainFilters() {
  const el = document.getElementById('domainFilters');
  let h = `<button class="filter-btn ${domainFilter==='all'?'active':''}" onclick="setDomain('all')"
    style="${domainFilter==='all'?'background:var(--purple);border-color:var(--purple)':''}">All</button>`;
  h += `<button class="filter-btn ${domainFilter==='cross'?'active':''}" onclick="setDomain('cross')"
    style="${domainFilter==='cross'?'background:#fff;border-color:#fff;color:#000':''}">Cross-domain</button>`;
  for(const [k,l] of Object.entries(DL)){
    const on = domainFilter===k;
    h += `<button class="filter-btn ${on?'active':''}" onclick="setDomain('${k}')"
      style="${on?`background:${DC[k]};border-color:${DC[k]};color:rgba(0,0,0,0.85)`:''}">
      <span class="filter-dot" style="background:${DC[k]}"></span>${l}
    </button>`;
  }
  el.innerHTML = h;
}

function renderTierFilters() {
  const el = document.getElementById('tierFilters');
  const tiers = [['all','All sources'],['national','National'],['international','International'],
    ['domain','Domain'],['explainer','Explainer'],['lived','Lived experience'],['analysis','Analysis']];
  el.innerHTML = tiers.map(([k,l])=>
    `<button class="tier-btn ${tierFilter===k?'active':''}" onclick="setTier('${k}')">${l}</button>`
  ).join('');
}

function setDomain(f) {
  domainFilter=f; showing=50;
  renderDomainFilters(); renderArticles();
  document.getElementById('clusterSection').style.display = (f==='all'||f==='cross')?'block':'none';
}

function setTier(t) {
  tierFilter=t; showing=50;
  renderAll();
}

function renderClusters() {
  const grid = document.getElementById('clusterGrid');
  const base = getBaseFiltered();
  const cross = base.filter(a=>a.cross_domain&&a.domains&&a.domains.length>=2);
  const pairs = {};
  for(const a of cross){
    const ds=[...a.domains].sort();
    for(let i=0;i<ds.length;i++) for(let j=i+1;j<ds.length;j++){
      const k=ds[i]+'+'+ds[j];
      if(!pairs[k])pairs[k]=[];
      pairs[k].push(a);
    }
  }
  const top = Object.entries(pairs).sort((a,b)=>b[1].length-a[1].length).slice(0,8);
  if(!top.length){grid.innerHTML='<div class="empty-state">No cross-domain signals.</div>';return;}

  grid.innerHTML = top.map(([pk,arts])=>{
    const [d1,d2]=pk.split('+');
    const shown=arts.slice(0,4);
    return `<div class="cluster-card">
      <div class="cluster-header">
        <span class="cluster-dot" style="background:${DC[d1]||'#666'}"></span>
        <span class="cluster-dot" style="background:${DC[d2]||'#666'}"></span>
        <span class="cluster-label">${DL[d1]||d1} + ${DL[d2]||d2}</span>
        <span class="cluster-count">${arts.length}</span>
      </div>
      <div class="cluster-articles">
        ${shown.map(a=>`<a class="cluster-article" href="${a.url}" target="_blank" rel="noopener">
          <div class="cluster-article-title">${esc(a.title)}</div>
          <div class="cluster-article-meta">${esc(a.source)} · ${a.date}</div>
        </a>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderArticles() {
  const list = document.getElementById('articleList');
  const filtered = getFiltered();
  const slice = filtered.slice(0,showing);

  document.getElementById('articlesCount').textContent = `${filtered.length} articles`;
  if(!slice.length){
    list.innerHTML='<div class="empty-state">No articles match.</div>';
    document.getElementById('loadMore').style.display='none';
    return;
  }

  list.innerHTML = slice.map(a=>{
    const tags = (a.domains||[]).filter(d=>DL[d]).map(d=>
      `<span class="domain-tag" style="background:${DC[d]}">${DL[d]}</span>`
    ).join('');
    return `<a class="article-card" href="${a.url}" target="_blank" rel="noopener">
      <div>
        <div class="article-title">${esc(a.title)}</div>
        <div class="article-meta"><span class="article-source">${esc(a.source)}</span><span>${a.date}</span></div>
      </div>
      <div class="domain-tags">${tags}</div>
    </a>`;
  }).join('');

  const btn = document.getElementById('loadMore');
  if(filtered.length>showing){
    btn.style.display='block';
    btn.textContent=`Show more (${filtered.length-showing} remaining)`;
    btn.onclick=()=>{showing+=50;renderArticles();};
  } else btn.style.display='none';
}

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

init();
</script>
</body>
</html>
